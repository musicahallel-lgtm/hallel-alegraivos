<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#080808">
    <title>Hallel — Alegraivos</title>
    <link rel="preload" href="logo.png" as="image">
    <!-- EmailJS SDK — defer so it doesn't block first paint -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js" defer></script>
    <style>
        :root {
            /* ── Identidade Visual Hallel ── */
            --purple:       #00963F;   /* verde esperança — cor principal */
            --purple-light: #2db85a;   /* verde claro — hover */
            --purple-dark:  #007a32;   /* verde escuro */
            --gold:         #F15A24;   /* laranja Hallel */
            --gold-light:   #FFD400;   /* amarelo Hallel */
            --bg:   #080808;
            --bg2:  #0f0f0f;
            --bg3:  #181818;
            --bg4:  #202020;
            --border: #2a2a2a;
            --text:   #f0f0f0;
            --muted:  #909090;
            --green:  #00963F;
            --red:    #9E1C20;
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { height: -webkit-fill-available; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; min-height: -webkit-fill-available;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            text-rendering: optimizeSpeed;
        }

        /* ── Header ── */
        .header {
            background: #ffffff; border-bottom:1px solid #e0e0e0;
            padding: 0 20px; position:sticky; top:0; z-index:100;
            display:flex; align-items:center; height:64px; gap:16px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            transform: translateZ(0); /* GPU layer — prevents repaint on scroll */
            overflow-x: auto; overflow-y: hidden;
            scrollbar-width: none; /* Firefox */
        }
        .header::-webkit-scrollbar { display:none; } /* Safari/Chrome */
        .logo {
            display:flex; align-items:center; gap:8px; white-space:nowrap; text-decoration:none;
        }
        .logo img {
            height:48px; width:auto; object-fit:contain;
        }
        .logo-alegraivos {
            font-size:17px; font-weight:800; color:#007a32; letter-spacing:.3px;
        }
        .nav { display:flex; gap:4px; flex:1; overflow-x:auto; overflow-y:hidden; scrollbar-width:none; white-space:nowrap; -webkit-overflow-scrolling:touch; }
        .nav::-webkit-scrollbar { display:none; }
        .nav-btn {
            padding:8px 16px; border-radius:var(--radius-sm); border:none;
            background:transparent; color:#555; cursor:pointer;
            font-size:14px; font-weight:600;
            transition:background-color .15s, color .15s;
            touch-action:manipulation;
        }
        .nav-btn:hover { background:#f0f0f0; color:#111; }
        .nav-btn.active { background:var(--purple); color:#fff; }
        .header-actions { display:flex; gap:8px; margin-left:auto; }

        /* ── Buttons ── */
        .btn {
            padding:9px 18px; border-radius:var(--radius-sm); border:none;
            cursor:pointer; font-size:14px; font-weight:600;
            transition:background-color .15s, color .15s, opacity .15s;
            display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
            font-family:inherit; touch-action:manipulation;
        }
        .btn-primary  { background:var(--purple); color:#fff; }
        .btn-primary:hover { background:var(--purple-light); color:#fff; }
        .btn-gold     { background:var(--gold); color:#1a0a00; }
        .btn-gold:hover { background:var(--gold-light); }
        .btn-ghost    { background:transparent; color:var(--muted); border:1px solid var(--border); }
        .btn-ghost:hover { background:var(--bg3); color:var(--text); }
        .btn-danger   { background:var(--red); color:#fff; }
        .btn-danger:hover { opacity:.85; }
        .btn-sm  { padding:6px 12px; font-size:13px; }
        .btn-icon{ padding:7px; }

        /* ── Main ── */
        .main { max-width:1200px; margin:0 auto; padding:24px 20px; }
        .section-header {
            display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;
        }
        .section-title { font-size:20px; font-weight:700; }
        .section-count {
            font-size:12px; color:var(--muted); background:var(--bg3);
            padding:3px 10px; border-radius:20px;
        }

        /* ── Toolbar ── */
        .toolbar { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
        .search-wrap { flex:1; min-width:200px; position:relative; }
        .search-wrap .si {
            position:absolute; left:12px; top:50%; transform:translateY(-50%);
            color:var(--muted); font-size:15px; pointer-events:none;
        }
        .search-input {
            width:100%; padding:10px 12px 10px 36px;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:var(--radius-sm); color:var(--text); font-size:14px;
        }
        .search-input:focus { outline:none; border-color:var(--purple); }
        select {
            padding:10px 12px; background:var(--bg3); border:1px solid var(--border);
            border-radius:var(--radius-sm); color:var(--text); font-size:14px; cursor:pointer;
        }
        select:focus { outline:none; border-color:var(--purple); }

        /* ── Song Grid ── */
        .songs-grid {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:14px;
        }
        .song-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); padding:16px;
            cursor:pointer; transition:all .15s; position:relative;
        }
        .song-card:hover {
            border-color:var(--purple); background:var(--bg3); transform:translateY(-2px);
            box-shadow:0 8px 30px rgba(124,58,237,.15);
        }
        .card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .song-num {
            background:var(--purple); color:#fff; width:28px; height:28px;
            border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-size:12px; font-weight:700; flex-shrink:0;
        }
        .key-badge {
            background:var(--bg4); color:var(--gold); padding:3px 8px;
            border-radius:4px; font-size:12px; font-weight:700;
        }
        .song-title { font-size:16px; font-weight:700; margin-bottom:3px; }
        .song-artist { font-size:13px; color:var(--muted); margin-bottom:10px; min-height:18px; }
        .song-tags { display:flex; gap:5px; flex-wrap:wrap; }
        .tag {
            font-size:11px; padding:2px 7px; border-radius:4px;
            background:var(--bg4); color:var(--muted); font-weight:500;
        }
        .tag-yt     { color:#ff5555; }
        .tag-sp     { color:#1DB954; }
        .tag-dz     { color:#ef5466; }
        .tag-bpm    { color:var(--green); }
        .tag-pdf    { color:#60a5fa; }
        .tag-moises { color:#f97316; }
        .moises-btn {
            display:flex; align-items:center; gap:10px; padding:12px 14px;
            background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(249,115,22,.05));
            border:1px solid rgba(249,115,22,.4); border-radius:var(--radius-sm);
            text-decoration:none; color:var(--text); transition:all .2s;
        }
        .moises-btn:hover { background:linear-gradient(135deg,rgba(249,115,22,.28),rgba(249,115,22,.1)); border-color:rgba(249,115,22,.7); }
        .moises-logo { font-size:20px; }
        .moises-label { font-weight:700; font-size:14px; color:#f97316; }
        .moises-desc  { font-size:11px; color:var(--muted); margin-top:1px; }

        /* ── Set List Cards ── */
        .setlist-grid {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px;
        }
        .setlist-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); padding:20px;
            cursor:pointer; transition:all .15s;
        }
        .setlist-card:hover { border-color:var(--purple); transform:translateY(-2px); }
        .setlist-name { font-size:18px; font-weight:700; margin-bottom:4px; }
        .setlist-date { font-size:13px; color:var(--muted); margin-bottom:10px; }
        .setlist-count { font-size:13px; color:var(--purple-light); font-weight:600; }
        .setlist-preview { margin-top:10px; font-size:13px; color:var(--muted); }
        .setlist-preview div { padding:2px 0; }

        /* ── Modal ── */
        .backdrop {
            position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:200;
            display:flex; align-items:flex-start; justify-content:center;
            padding:20px; overflow-y:auto;
        }
        .modal {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); width:100%; max-width:840px;
            margin:auto; position:relative;
        }
        .modal-hd {
            padding:20px 24px; border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:12px; flex-wrap:wrap;
        }
        .modal-title { font-size:20px; font-weight:700; flex:1; min-width:0; }
        .modal-body { padding:24px; }
        .modal-ft {
            padding:14px 24px; border-top:1px solid var(--border);
            display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap;
        }
        .close-btn {
            background:transparent; border:none; color:var(--muted);
            font-size:22px; cursor:pointer; padding:4px; line-height:1; flex-shrink:0;
        }
        .close-btn:hover { color:var(--text); }

        /* ── Form ── */
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .fg { display:flex; flex-direction:column; gap:6px; }
        .fg.full { grid-column:1/-1; }
        label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
        input[type=text],input[type=url],input[type=number],select.field,textarea {
            padding:10px 12px; background:var(--bg3); border:1px solid var(--border);
            border-radius:var(--radius-sm); color:var(--text); font-size:14px;
            font-family:inherit; width:100%;
        }
        input:focus,select.field:focus,textarea:focus { outline:none; border-color:var(--purple); }
        textarea {
            resize:vertical; min-height:130px; font-family:'Courier New',monospace;
            font-size:13px; line-height:1.7;
        }
        .divider { height:1px; background:var(--border); margin:4px 0; }

        /* ── PDF Upload Box ── */
        .pdf-upload-box {
            border:2px dashed var(--border); border-radius:var(--radius-sm);
            padding:20px; text-align:center; transition:all .2s; cursor:pointer;
            background:var(--bg3);
        }
        .pdf-upload-box:hover, .pdf-upload-box.drag { border-color:var(--purple); background:var(--bg4); }
        .pdf-upload-box input[type=file] { display:none; }
        .pdf-upload-icon { font-size:32px; margin-bottom:8px; }
        .pdf-upload-label { font-size:14px; font-weight:600; color:var(--text); margin-bottom:4px; }
        .pdf-upload-hint  { font-size:12px; color:var(--muted); }

        .pdf-badge {
            display:flex; align-items:center; gap:10px; padding:12px 14px;
            background:rgba(96,165,250,.1); border:1px solid rgba(96,165,250,.3);
            border-radius:var(--radius-sm);
        }
        .pdf-badge-icon { font-size:22px; }
        .pdf-badge-name { flex:1; font-size:13px; font-weight:600; color:#60a5fa; }
        .pdf-badge-size { font-size:11px; color:var(--muted); }

        /* ── Stem Mixer ── */
        .mixer-wrap { padding:12px; display:flex; flex-direction:column; gap:10px; }
        .mixer-load-btn {
            display:flex; align-items:center; justify-content:center; gap:10px;
            padding:18px; border-radius:var(--radius-sm); border:2px dashed var(--purple);
            background:transparent; color:var(--purple); font-size:15px; font-weight:700;
            cursor:pointer; transition:all .2s; width:100%; font-family:inherit;
        }
        .mixer-load-btn:hover { background:rgba(0,150,63,.1); }
        .mixer-progress-bar-wrap {
            padding:16px 14px; background:var(--bg4); border-radius:var(--radius-sm);
            display:none;
        }
        .mixer-progress-bar-label { font-size:13px; color:var(--muted); margin-bottom:8px; }
        .mixer-progress-bar {
            height:6px; background:var(--border); border-radius:3px; overflow:hidden;
        }
        .mixer-progress-bar-fill { height:100%; background:var(--purple); width:0%; transition:width .3s; border-radius:3px; }
        .mixer-transport {
            display:flex; align-items:center; gap:12px; padding:12px 14px;
            background:var(--bg4); border-radius:var(--radius-sm);
        }
        .mixer-play-btn {
            width:56px; height:56px; border-radius:50%; border:none; cursor:pointer;
            background:var(--purple); color:#fff; font-size:22px;
            display:flex; align-items:center; justify-content:center; flex-shrink:0;
            transition:all .15s; touch-action:manipulation;
        }
        .mixer-play-btn:active { transform:scale(.93); }
        .mixer-transport { flex-direction:column; gap:12px; }
        .mixer-transport-row1 { display:flex; align-items:center; gap:12px; width:100%; }
        .mixer-time { font-size:14px; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; margin-left:auto; }
        .mixer-seek-input {
            -webkit-appearance:none; appearance:none;
            width:100%; height:8px; border-radius:4px; outline:none;
            background: linear-gradient(to right, var(--purple) 0%, #444 0%);
            cursor:pointer; touch-action:manipulation;
        }
        .mixer-seek-input::-webkit-slider-thumb {
            -webkit-appearance:none; width:28px; height:28px; border-radius:50%;
            background:var(--purple-light); cursor:pointer;
            box-shadow:0 2px 6px rgba(0,0,0,.4);
        }
        .mixer-stems { display:flex; flex-direction:column; gap:8px; }
        .stem-row {
            display:grid; grid-template-columns:32px 1fr auto auto;
            align-items:center; gap:10px;
            padding:12px 12px; background:var(--bg4); border-radius:var(--radius-sm);
            transition:opacity .2s;
        }
        .stem-row.muted { opacity:.3; }
        .stem-emoji { font-size:20px; text-align:center; }
        .stem-name-vol { display:flex; flex-direction:column; gap:6px; min-width:0; }
        .stem-name { font-size:13px; font-weight:600; color:var(--text); }
        .stem-vol {
            -webkit-appearance:none; appearance:none;
            width:100%; height:8px; border-radius:4px; outline:none;
            background: linear-gradient(to right, var(--purple) 80%, var(--border) 80%);
            cursor:pointer; touch-action:manipulation;
        }
        .stem-vol::-webkit-slider-thumb {
            -webkit-appearance:none; width:26px; height:26px; border-radius:50%;
            background:var(--purple-light); cursor:pointer;
            box-shadow:0 2px 6px rgba(0,0,0,.4);
        }
        .stem-btn {
            min-width:48px; height:48px; border-radius:var(--radius-sm);
            border:2px solid var(--border);
            background:transparent; color:var(--muted); font-size:13px; font-weight:800;
            cursor:pointer; transition:all .15s; touch-action:manipulation;
            display:flex; align-items:center; justify-content:center;
        }
        .stem-btn:active { transform:scale(.9); }
        .stem-btn.on { background:var(--purple); border-color:var(--purple); color:#fff; }
        .mixer-loading { padding:30px; text-align:center; color:var(--muted); font-size:13px; }

        /* ── Song Detail ── */
        .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
        .dsec { background:var(--bg3); border-radius:var(--radius-sm); overflow:hidden; }
        .dsec-title {
            padding:9px 14px; font-size:11px; font-weight:700; text-transform:uppercase;
            letter-spacing:.5px; color:var(--muted); border-bottom:1px solid var(--border);
            background:var(--bg4);
        }

        /* ── Cifra toggle ── */
        .cifra-toggle {
            display:flex; border-bottom:1px solid var(--border); background:var(--bg4);
        }
        .ctab {
            flex:1; padding:9px 12px; font-size:13px; font-weight:600; cursor:pointer;
            color:var(--muted); border:none; background:transparent; transition:all .15s;
            border-bottom:2px solid transparent; margin-bottom:-1px;
        }
        .ctab:hover { color:var(--text); }
        .ctab.active { color:var(--purple-light); border-bottom-color:var(--purple); }

        /* ── Player ── */
        .player-tabs { display:flex; border-bottom:1px solid var(--border); background:var(--bg4); }
        .ptab {
            padding:10px 14px; font-size:13px; font-weight:600; cursor:pointer;
            color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-1px;
            transition:all .15s; border:none; background:transparent;
        }
        .ptab:hover { color:var(--text); }
        .ptab.active { color:var(--purple-light); border-bottom-color:var(--purple); }
        .video-wrap { position:relative; padding-bottom:56.25%; height:0; }
        .video-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
        .player-ph { padding:40px; text-align:center; color:var(--muted); font-size:14px; }

        /* ── PDF viewer ── */
        .pdf-viewer {
            width:100%; height:420px; border:none; display:block; background:#fff;
        }
        .pdf-viewer-wrap { padding:0; }
        .pdf-no-preview {
            padding:30px; text-align:center; color:var(--muted); font-size:14px;
        }
        .pdf-actions {
            padding:10px 14px; display:flex; gap:8px; align-items:center;
            border-top:1px solid var(--border); background:var(--bg4);
        }

        /* ── Chord Chart ── */
        .chord-chart {
            padding:14px 16px; font-family:'Courier New',monospace; font-size:13px;
            line-height:1.8; white-space:pre-wrap; word-break:break-word; min-height:180px;
        }
        .ch { color:var(--gold); font-weight:700; }
        .transpose-bar {
            display:flex; align-items:center; gap:8px; padding:10px 14px;
            border-top:1px solid var(--border); background:var(--bg4);
        }
        .t-label { font-size:12px; color:var(--muted); font-weight:600; }
        .t-offset { min-width:60px; text-align:center; font-size:14px; font-weight:700; color:var(--gold); }

        /* ── Links ── */
        .links-list { padding:10px; display:flex; flex-direction:column; gap:6px; }
        .link-item {
            display:flex; align-items:center; gap:10px; padding:10px 12px;
            background:var(--bg4); border-radius:var(--radius-sm); text-decoration:none;
            color:var(--text); font-size:13px; transition:all .15s;
        }
        .link-item:hover { background:var(--border); }
        .link-label { font-weight:600; }
        .link-desc  { font-size:11px; color:var(--muted); }

        /* ── Set List Editor ── */
        .sl-editor { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        .col-hd {
            font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase;
            letter-spacing:.5px; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border);
        }
        .sl-item {
            display:flex; align-items:center; gap:8px; padding:8px 12px;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:var(--radius-sm); margin-bottom:6px;
        }
        .sl-num { color:var(--gold); font-weight:700; font-size:14px; min-width:22px; align-self:flex-start; padding-top:2px; }
        .sl-info { flex:1; display:flex; flex-direction:column; gap:3px; min-width:0; }
        .sl-title { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sl-voz-row { display:flex; align-items:center; gap:4px; }
        .sl-voz-input {
            background:transparent; border:none; border-bottom:1px dashed var(--border);
            color:var(--muted); font-size:11px; padding:1px 4px; outline:none;
            width:100%; min-width:0;
        }
        .sl-voz-input::placeholder { color:var(--bg4); }
        .sl-voz-input:focus { border-bottom-color:var(--purple); color:var(--text); }
        .sl-key { font-size:11px; color:var(--gold); background:var(--bg4); padding:2px 6px; border-radius:4px; align-self:flex-start; margin-top:2px; }
        .avail-list { overflow-y:auto; max-height:460px; display:flex; flex-direction:column; gap:5px; }
        .avail-item {
            display:flex; align-items:center; gap:10px; padding:10px 12px;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:var(--radius-sm); cursor:pointer; transition:all .15s;
        }
        .avail-item:hover { border-color:var(--purple); }
        .avail-item.in-list { opacity:.38; cursor:default; pointer-events:none; }

        /* New SL modal */
        .newsl-templates { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
        .newsl-tpl {
          flex:1; min-width:130px; padding:16px 12px; border-radius:var(--radius-sm);
          border:2px solid var(--border); cursor:pointer; text-align:center; transition:all .2s;
          background:var(--bg3);
        }
        .newsl-tpl:hover { border-color:var(--purple); }
        .newsl-tpl.sel { border-color:var(--purple); background:rgba(0,150,63,.12); }
        .newsl-tpl-icon { font-size:26px; margin-bottom:6px; }
        .newsl-tpl-name { font-weight:700; font-size:13px; }
        .newsl-tpl-desc { font-size:11px; color:var(--muted); margin-top:3px; line-height:1.4; }
        /* Block sections in set list editor */
        .sl-block { margin-bottom:14px; border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--border); }
        .sl-block-hd {
          display:flex; align-items:center; gap:8px; padding:9px 12px;
          background:var(--purple); color:#fff; font-weight:700; font-size:13px;
        }
        .sl-block-hd-name { flex:1; }

function gerarRecorrentes(year) {
    const all = [];
    RECORRENTES.forEach(rec => {
        const d = new Date(year, 0, 1);
        while (d.getDay() !== rec.weekday) d.setDate(d.getDate()+1);
        while (d.getFullYear() === year) {
            const ds = d.toISOString().slice(0,10);
            all.push({ ...rec, id: rec.id+'-'+ds, recId: rec.id, start: ds, end: ds, recurring: true });
            d.setDate(d.getDate()+7);
        }
    });
    return all;
}

function openDB() {
    return new Promise((res, rej) => {
        const req = indexedDB.open('hallel_db', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('pdfs');
        req.onsuccess = e => { DB = e.target.result; res(DB); };
        req.onerror = rej;
    });
}

function dbSavePDF(songId, file) {
    return new Promise(async (res, rej) => {
        const buf = await file.arrayBuffer();
        const tx = DB.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').put({ buf, name: file.name, size: file.size }, songId);
        tx.oncomplete = res;
        tx.onerror = rej;
    });
}

function dbGetPDF(songId) {
    return new Promise((res) => {
        const tx = DB.transaction('pdfs', 'readonly');
        const req = tx.objectStore('pdfs').get(songId);
        req.onsuccess = () => res(req.result || null);
        req.onerror = () => res(null);
    });
}

function dbDeletePDF(songId) {
    return new Promise((res) => {
        const tx = DB.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').delete(songId);
        tx.oncomplete = res;
        tx.onerror = res;
    });
}

function dbHasPDF(songId) {
    return new Promise((res) => {
        const tx = DB.transaction('pdfs', 'readonly');
        const req = tx.objectStore('pdfs').count(songId);
        req.onsuccess = () => res(req.result > 0);
        req.onerror = () => res(false);
    });
}

async function loadPdfIndex() {
    return new Promise((res) => {
        const tx = DB.transaction('pdfs', 'readonly');
        const req = tx.objectStore('pdfs').getAllKeys();
        req.onsuccess = () => { S.hasPdf = new Set(req.result); res(); };
        req.onerror = res;
    });
}

let _persistTimer = null;
function persist(immediate) {
    if (immediate) { _doPersist(); return; }
    clearTimeout(_persistTimer);
    _persistTimer = setTimeout(_doPersist, 400);
}
function _doPersist() {
    try {
        localStorage.setItem('hl_songs',    JSON.stringify(S.songs));
        localStorage.setItem('hl_setlists', JSON.stringify(S.setlists));
        localStorage.setItem('hl_escalas',  JSON.stringify(S.escalas));
        localStorage.setItem('hl_members',  JSON.stringify(S.members));
        localStorage.setItem('hl_activity',  JSON.stringify(S.activityLog.slice(-500)));
        localStorage.setItem('hl_requests',     JSON.stringify(S.accessRequests));
        localStorage.setItem('hl_availability', JSON.stringify(S.availability));
        localStorage.setItem('hl_substitutions',JSON.stringify(S.substitutions));
    } catch(e) {
        // localStorage quota exceeded — trim and retry
        S.activityLog = S.activityLog.slice(-100);
        try { localStorage.setItem('hl_activity', JSON.stringify(S.activityLog)); } catch(_) {}
    }
}
function hydrate() {
    try {
        const s  = localStorage.getItem('hl_songs');
        const sl = localStorage.getItem('hl_setlists');
        const es = localStorage.getItem('hl_escalas');
        const mb = localStorage.getItem('hl_members');
        if (s)  S.songs    = JSON.parse(s);
        if (sl) S.setlists = JSON.parse(sl);
        if (es) S.escalas  = JSON.parse(es);
        if (mb) S.members  = JSON.parse(mb);
        const ac = localStorage.getItem('hl_activity');
        if (ac) { S.activityLog = JSON.parse(ac).slice(-500); } // keep only last 500
        const rq = localStorage.getItem('hl_requests');
        if (rq) S.accessRequests = JSON.parse(rq);
        const av = localStorage.getItem('hl_availability');
        if (av) S.availability = JSON.parse(av);
        const sb = localStorage.getItem('hl_substitutions');
        if (sb) S.substitutions = JSON.parse(sb);
    } catch(e) { console.error(e); }
    // Migrate: instrument (string) → instruments (array)
    S.members.forEach(m => {
        if (!m.instruments) m.instruments = m.instrument ? [m.instrument] : [];
        if (!m.memberType) m.memberType = 'membro'; // Migrate: default type = membro
    });
    // Migrate old set lists (songIds → blocks)
    S.setlists.forEach(sl => {
        if (!sl.blocks) {
            sl.blocks = [{ id: 'b'+uid(), name: 'Geral', songIds: sl.songIds || [] }];
            delete sl.songIds;
        }
    });
}

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(v) { return (v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function ytId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([^&\n?#]+)/);
    return m ? m[1] : null;
}
function spId(url) {
    if (!url) return null;
    const m = url.match(/spotify\.com\/(?:intl-[a-z]+\/)?track\/([a-zA-Z0-9]+)/);
    return m ? m[1] : null;
}
function dzId(url) {
    if (!url) return null;
    const m = url.match(/deezer\.com\/(?:[a-z]+\/)?track\/(\d+)/);
    return m ? m[1] : null;
}

// Chord transposition
const SH = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FL = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
function tNote(n, d) {
    let i = SH.indexOf(n); if (i===-1) i=FL.indexOf(n); if (i===-1) return n;
    return SH[((i+d)%12+12)%12];
}
function tChord(c, d) {
    const m = c.match(/^([A-G][b#]?)(.*)$/);
    return m ? tNote(m[1],d)+m[2] : c;
}
function tText(txt, d) {
    if (!d) return txt;
    return txt.replace(/\[([A-G][b#]?[^\]]*)\]/g, (_,c)=>'['+tChord(c,d)+']');
}
function fmtChord(txt) {
    return txt.replace(/\[([A-G][b#]?[^\]]*)\]/g, (_,c)=>`<span class="ch">[${c}]</span>`);
}
function fmtLines(txt) { return txt.split('\n').map(fmtChord).join('\n'); }
function offsetLbl(n)  { return n===0?'Original':(n>0?'+':'')+n; }
function fmtSize(b)    { return b > 1048576 ? (b/1048576).toFixed(1)+' MB' : Math.round(b/1024)+' KB'; }

const KEYS = ['C','C#/Db','D','D#/Eb','E','F','F#/Gb','G','G#/Ab','A','A#/Bb','B'];

function toast(msg) {

    if (!userInput) { showRecErr('Digite seu nome de usuário.'); return; }
    const member = S.members.find(m => m.user.toLowerCase() === userInput);
    if (!member) { showRecErr('Usuário não encontrado. Verifique o nome ou contate o ADM.'); return; }
    if (!member.email) { showRecErr('Nenhum email cadastrado para este usuário. Contate o administrador.'); return; }

    const btn = document.getElementById('rec-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Enviando…'; }

    try {
        emailjs.init(EMAILJS_CFG.publicKey);
        await emailjs.send(EMAILJS_CFG.serviceId, EMAILJS_CFG.templateId, {
            to_email:    member.email,
            member_name: member.name,
            username:    member.user,
            password:    member.pass,
            app_url:     'https://musicahallel-lgtm.github.io/hallel-alegraivos/',
        });
        const okDiv = document.getElementById('rec-ok');
        const okMsg = document.getElementById('rec-ok-msg');
        if (okDiv) okDiv.classList.add('show');
        if (okMsg) okMsg.textContent = `Email enviado para ${member.email.replace(/(.{2}).+(@.+)/, '$1***$2')}`;
        if (btn) { btn.style.display='none'; }
    } catch(err) {
        if (btn) { btn.disabled=false; btn.textContent='📧 Tentar novamente'; }
        showRecErr('Erro ao enviar email. Verifique a configuração do EmailJS ou contate o ADM.');
        console.error('EmailJS error:', err);
    }
}

function showRecErr(msg) {
    const el = document.getElementById('rec-err');
    if (el) { el.textContent=msg; el.style.display='block'; }
}

function doLogin() {
    const user = document.getElementById('lg-user')?.value?.trim().toLowerCase();
    const pass = document.getElementById('lg-pass')?.value;
    // Check static credentials (ADM / Equipe)
    const cred = CREDS.find(c => c.user === user && c.pass === pass);
    if (cred) {
        S.role = cred.role;
        S.currentMember = null;
        localStorage.setItem('hl_role', cred.role);
        render();
        setTimeout(() => {
            const pending = S.accessRequests.filter(r=>r.status==='pending');
            if (pending.length) {
                toast(`📨 ${pending.length} solicitação${pending.length>1?'ões':''} de acesso pendente${pending.length>1?'s':''}! Veja em 👥 Membros.`);
                return;
            }
            const dismissed = JSON.parse(localStorage.getItem('hl_notif_dismissed')||'[]');
            const near = EVENTOS_2026.filter(ev => { const d=evDaysUntil(ev); return d>=0&&d<=15&&!dismissed.includes(ev.id); });
            if (near.length) {
                const ev = near[0]; const d = evDaysUntil(ev);
                toast(`🔔 ${ev.title} — ${d===0?'HOJE':d===1?'amanhã':'em '+d+' dias'}! Veja a Agenda.`);
            }
        }, 800);
        return;
    }
    // Check member credentials
    const member = S.members.find(m => m.user.toLowerCase() === user && m.pass === pass);
    if (member) {
        S.role = 'membro';
        S.currentMember = member;
        localStorage.setItem('hl_role', 'membro');
        localStorage.setItem('hl_current_member', member.id);
        // Track login
        S.activityLog.push({ id: uid(), memberId: member.id, memberName: member.name,
            type: 'login', at: Date.now(), duration: 0 });
        persist();
        render();
        // Primeiro acesso → pede WhatsApp e email antes do alert de missão
        setTimeout(() => {
            if (!member.firstAccessDone) {
                S.modal = { type: 'first-access', data: member };
                render();
            } else {
                // Check substitution notifications first, then mission alert
                if (!checkSubNotifications(member)) {
                    showMissionAlert(member);
                }
            }
        }, 300);
        return;
    }
    const err = document.getElementById('login-err');
    if (err) err.classList.add('show');
}

function doLogout() {
    S.role = null;
    S.currentMember = null;
    localStorage.removeItem('hl_role');
    localStorage.removeItem('hl_current_member');
    S.modal = null;
    render();
}

function showMissionAlert(member) {
    const escalas = getMemberEscalas(member.name);
    const upcoming = escalas.filter(e => e.daysUntil >= 0);
    if (!upcoming.length) {
        toast(`Olá, ${member.name}! 👋 Nenhuma escala futura no momento.`);
        return;
    }
    S.modal = { type: 'mission-alert', data: { member, escalas: upcoming } };
    render();
}

function getMemberEscalas(memberName) {
    const results = [];
    const nameLower = memberName.toLowerCase().trim();
    Object.entries(S.escalas).forEach(([evId, esc]) => {
        const roles = EV_INSTR.filter(({k}) => {
            const val = (esc[k]||'').toLowerCase().trim();
            return val && (val === nameLower || val.includes(nameLower));
        });
        if (!roles.length) return;
        const ev = EVENTOS_2026.find(e=>e.id===evId) || REC_2026.find(e=>e.id===evId);
        if (!ev) return;
        results.push({ ev, roles, daysUntil: evDaysUntil(ev) });
    });
    return results.sort((a,b) => a.daysUntil - b.daysUntil);
}

//  ACTIONS

function nav(p)  { S.page=p; render(); }
function doSearch(v)    { S.q=v;        render(); }
function doFilterKey(v) { S.filterKey=v; render(); }

function closeModal(e) {
    if (e && e.target!==e.currentTarget) return;
    stopActTimer(); // save any active tracking session
    if (S.currentPdfUrl) { URL.revokeObjectURL(S.currentPdfUrl); S.currentPdfUrl=null; }
    S.modal=null; S.transpose=0; S.ptab='youtube'; S.cifraTab='texto';
    S.pendingPdfFile=null; S.pendingPdfRemove=false;
    render();
}

// Songs
async function openDetail(id) {
    const s=S.songs.find(x=>x.id===id); if (!s) return;
    S.transpose=0;
    const hasPdf = S.hasPdf.has(id);
    S.cifraTab = hasPdf ? 'pdf' : 'texto';
    S.ptab = ytId(s.youtubeUrl)?'youtube': spId(s.spotifyUrl)?'spotify': dzId(s.deezerUrl)?'deezer':'youtube';
    // Load PDF from IDB
    if (S.currentPdfUrl) { URL.revokeObjectURL(S.currentPdfUrl); S.currentPdfUrl=null; }
    if (hasPdf) {
        const rec = await dbGetPDF(id);
        if (rec) {
            const blob = new Blob([rec.buf], {type:'application/pdf'});
            S.currentPdfUrl = URL.createObjectURL(blob);
        }
    }
    S.modal={type:'detail',data:s}; render();
    maybeInitMixer(s);
}

function openAdd() {
    S.pendingPdfFile=null; S.pendingPdfRemove=false;
    S.modal={type:'add',data:null}; render();
}
function openEdit(id) {
    const s=S.songs.find(x=>x.id===id); if(!s)return;
    S.pendingPdfFile=null; S.pendingPdfRemove=false;
    S.modal={type:'add',data:{...s}}; render();
}

async function saveSong(eid) {
    const title=document.getElementById('f_title')?.value?.trim();
    if (!title) { toast('⚠️ Título é obrigatório!'); return; }
    const d = {
        id: eid||uid(), title,
        artist:      document.getElementById('f_artist')?.value?.trim()||'',
        vozPrincipal:document.getElementById('f_voz')?.value?.trim()||'',
        key:      document.getElementById('f_key')?.value||'',
        bpm:      parseInt(document.getElementById('f_bpm')?.value)||0,
        category: document.getElementById('f_cat')?.value?.trim()||'',
        youtubeUrl: document.getElementById('f_yt')?.value?.trim()||'',
        spotifyUrl: document.getElementById('f_sp')?.value?.trim()||'',
        deezerUrl:  document.getElementById('f_dz')?.value?.trim()||'',
        moisesUrl:  document.getElementById('f_mo')?.value?.trim()||'',
        reaperUrl:  document.getElementById('f_rp')?.value?.trim()||'',
        bandUrl:    document.getElementById('f_bd')?.value?.trim()||'',
        chords:  document.getElementById('f_ch')?.value||'',
        notes:   document.getElementById('f_nt')?.value?.trim()||'',
    };

    // Handle PDF
    if (S.pendingPdfFile) {
        await dbSavePDF(d.id, S.pendingPdfFile);
        S.hasPdf.add(d.id);
        toast('✅ Música e PDF salvos!');
    } else if (S.pendingPdfRemove) {
        await dbDeletePDF(d.id);
        S.hasPdf.delete(d.id);
        toast('✅ Música salva (PDF removido).');
    } else {
        toast(eid ? '✅ Música atualizada!' : '✅ Música adicionada!');
    }

    if (eid) {
        const i=S.songs.findIndex(s=>s.id===eid);
        if(i!==-1) {
            d.stemsPath = d.stemsPath || S.songs[i].stemsPath; // preserve stemsPath
            S.songs[i]=d;
        }
    } else { S.songs.push(d); }

    persist();
    S.modal=null; S.pendingPdfFile=null; S.pendingPdfRemove=false;
    render();
}

function saveBlockVoz(slId, blockId, songId, val) {
    const sl = S.setlists.find(x=>x.id===slId); if(!sl) return;
    const block = sl.blocks?.find(b=>b.id===blockId); if(!block) return;
    if (!block.vozes) block.vozes = {};
    block.vozes[songId] = val.trim();
    if (S.modal?.data?.id === slId) S.modal.data = sl;
    persist();
}

function saveSlEscalado(slId, key, val) {
    const sl = S.setlists.find(s=>s.id===slId); if(!sl) return;
    if (!sl.escalados) sl.escalados = {};
    sl.escalados[key] = val.trim();
    if (S.modal?.data?.id === slId) S.modal.data.escalados = sl.escalados;
    persist();
}

async function delSong(id) {
    if (!confirm('Excluir esta música?')) return;
    S.songs = S.songs.filter(s=>s.id!==id);
    S.setlists.forEach(sl=>{
        (sl.blocks||[]).forEach(b=>{ b.songIds=b.songIds.filter(x=>x!==id); });
    });
    if (S.hasPdf.has(id)) { await dbDeletePDF(id); S.hasPdf.delete(id); }
    persist(); S.modal=null; toast('🗑 Música excluída.'); render();
}

// PDF picks
function onPdfPick(input) {
    const f = input.files?.[0]; if (!f) return;
    S.pendingPdfFile = f;
    S.pendingPdfRemove = false;
    render();
}
function onPdfDrop(e) {
    e.preventDefault();
    document.getElementById('pdfDropZone')?.classList.remove('drag');
    const f = e.dataTransfer?.files?.[0];
    if (f && f.type==='application/pdf') { S.pendingPdfFile=f; render(); }
    else toast('⚠️ Envie um arquivo .pdf');
}
function clearPendingPdf() { S.pendingPdfFile=null; render(); }
function markPdfRemove()   { S.pendingPdfRemove=true; S.pendingPdfFile=null; render(); }
function cancelPdfRemove() { S.pendingPdfRemove=false; render(); }

// Transpose
function doT(d, reset) {
    if (reset) S.transpose=0; else S.transpose+=d;
    const song=S.modal?.data; if(!song) return;
    const transposed=tText(song.chords||'',S.transpose);

// ── Drag-and-drop para set list ──
const _dg = {on:false, id:null, ghost:null, over:null};

function dgDown(e, songId) {
    // only start drag on real pointer/touch, not keyboard clicks
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    _dg.on = false; _dg.id = songId;
    const song = S.songs.find(s=>s.id===songId);
    _dg.ghost = document.createElement('div');
    _dg.ghost.className = 'drag-ghost';
    _dg.ghost.textContent = (song?.title||'?');
    document.body.appendChild(_dg.ghost);
    document.addEventListener('pointermove', dgMv, {passive:false});
    document.addEventListener('pointerup',   dgUp);
    document.addEventListener('pointercancel', dgUp);
    dgMv(e);
    e.preventDefault();
}
function dgMv(e) {
    if (!_dg.ghost) return;
    _dg.ghost.style.left = (e.clientX + 14) + 'px';
    _dg.ghost.style.top  = (e.clientY - 18) + 'px';
    _dg.on = true; // mark as real drag (moved)
    // find block under pointer
    const els = document.elementsFromPoint(e.clientX, e.clientY);
    const bd = els.find(el => el.dataset && el.dataset.blockId);
    if (_dg.over && _dg.over !== bd) _dg.over.classList.remove('drag-over');
    _dg.over = bd || null;
    if (bd) bd.classList.add('drag-over');
    // dim source item
    const src = document.querySelector('.avail-item.dg-lifting');
    if (!src) {
        const items = document.querySelectorAll('.avail-item');
        items.forEach(it => { if (it.dataset && it.getAttribute('onpointerdown')?.includes(_dg.id)) it.classList.add('dg-lifting'); });
    }
    e.preventDefault();
}
function dgUp(e) {
    document.removeEventListener('pointermove', dgMv);
    document.removeEventListener('pointerup',   dgUp);
    document.removeEventListener('pointercancel', dgUp);
    if (_dg.ghost) { _dg.ghost.remove(); _dg.ghost = null; }
    document.querySelectorAll('.avail-item.dg-lifting').forEach(el=>el.classList.remove('dg-lifting'));
    if (_dg.over) {
        _dg.over.classList.remove('drag-over');
        const blockId = _dg.over.dataset.blockId;
        const modal = document.querySelector('[data-sl-id]');
        const slId = modal?.dataset.slId;
        if (_dg.on && slId && blockId && _dg.id) {
            slAddToBlock(slId, _dg.id, blockId);
        }
        _dg.over = null;
    }
    _dg.on = false; _dg.id = null;
}

// Block-aware actions
function slAddToBlock(slId, songId, blockId) {
    const sl = S.setlists.find(x=>x.id===slId); if(!sl) return;
    const bid = blockId || S.slActiveBlock || sl.blocks?.[0]?.id;
    const block = sl.blocks?.find(b=>b.id===bid);
    if (!block) return;
    if (block.songIds.includes(songId)) return;
    block.songIds.push(songId);
    S.slActiveBlock = bid;
    persist(); S.modal={type:'sl',data:sl}; render();
}
function slDelFromBlock(slId, blockId, songId) {
    const sl = S.setlists.find(x=>x.id===slId); if(!sl) return;
    const block = sl.blocks?.find(b=>b.id===blockId); if(!block) return;
    block.songIds = block.songIds.filter(x=>x!==songId);
    persist(); S.modal={type:'sl',data:sl}; render();
}
function slMoveInBlock(slId, blockId, songId, dir) {
    const sl = S.setlists.find(x=>x.id===slId); if(!sl) return;
    const block = sl.blocks?.find(b=>b.id===blockId); if(!block) return;
    const i = block.songIds.indexOf(songId); if(i===-1) return;
    const j = i+dir; if(j<0||j>=block.songIds.length) return;
    [block.songIds[i],block.songIds[j]]=[block.songIds[j],block.songIds[i]];
    persist(); S.modal={type:'sl',data:sl}; render();
}
function slSetActive(slId, blockId) {
    S.slActiveBlock = blockId;
    const sl = S.setlists.find(x=>x.id===slId); if(!sl) return;
    S.modal={type:'sl',data:sl}; render();

function slRenameBlock(slId, blockId) {
    const sl = S.setlists.find(x=>x.id===slId); if(!sl) return;
    const block = sl.blocks?.find(b=>b.id===blockId); if(!block) return;

function evDaysUntil(ev) {
    const today = new Date(); today.setHours(0,0,0,0);
    const start = new Date(ev.start + 'T00:00:00');
    return Math.round((start - today) / 86400000);
}

function evDateLabel(ev) {
    const s = ev.start.split('-'); const e = ev.end.split('-');
    const ds = parseInt(s[2]), ms = parseInt(s[1]);
    const de = parseInt(e[2]), me = parseInt(e[1]);
    if (ev.start === ev.end) return `${ds}/${ms < 10 ? '0'+ms : ms}`;
    if (ms === me) return `${ds}–${de}/${ms < 10 ? '0'+ms : ms}`;
    return `${ds}/${ms < 10?'0'+ms:ms}–${de}/${me < 10?'0'+me:me}`;
}

let _actTimer = null; // { type, songId, songTitle, tab, startAt }

function trackActivity(type, data = {}) {
    if (!isMembro() || !S.currentMember) return;
    const entry = { id: uid(), memberId: S.currentMember.id,
        memberName: S.currentMember.name, type, at: Date.now(), duration: 0, ...data };
    S.activityLog.push(entry);
    if (S.activityLog.length > 500) S.activityLog = S.activityLog.slice(-500);
    persist(); // debounced
}

function startActTimer(type, data = {}) {
    stopActTimer(); // save previous
    _actTimer = { type, ...data, startAt: Date.now() };
}

function stopActTimer() {
    if (!_actTimer) return;
    const duration = Math.round((Date.now() - _actTimer.startAt) / 1000);
    if (duration >= 3) trackActivity(_actTimer.type, { ..._actTimer, duration });
    _actTimer = null;
}

function saveMember(id) {
    const name   = document.getElementById('mf-name')?.value?.trim();
    const instrs = EV_INSTR.map(({k})=>k).filter(k=>document.getElementById('mf-ic-'+k)?.checked);
    const whats  = document.getElementById('mf-whats')?.value?.trim();
    const email  = document.getElementById('mf-email')?.value?.trim().toLowerCase();
    const user   = document.getElementById('mf-user')?.value?.trim().toLowerCase();
    const pass   = document.getElementById('mf-pass')?.value?.trim();
    const typeEl = document.querySelector('input[name="mf-type"]:checked');
    const memberType = typeEl ? typeEl.value : 'membro';
    if (!name||!user||!pass) { toast('⚠️ Preencha nome, usuário e senha.'); return; }
    if (!instrs.length) { toast('⚠️ Selecione pelo menos um instrumento.'); return; }
    const conflict = S.members.find(m => m.user===user && m.id!==id);
    if (conflict) { toast('⚠️ Esse nome de usuário já existe.'); return; }
    if (id) {
        const m = S.members.find(x=>x.id===id);
        if (m) { m.name=name; m.instruments=instrs; m.instrument=instrs[0]; m.whatsapp=whats; m.email=email; m.user=user; m.pass=pass; m.memberType=memberType; }
    } else {
        S.members.push({ id:'mb'+uid(), name, instruments:instrs, instrument:instrs[0], whatsapp:whats, email, user, pass, memberType });
    }
    persist(); closeModal(); render();
    toast(id ? `✅ ${name} atualizado!` : `✅ ${name} cadastrado no ministério!`);
}

function deleteMember(id) {
    const m = S.members.find(x=>x.id===id); if(!m) return;
    if (!confirm(`Remover ${m.name} do ministério?`)) return;
    S.members = S.members.filter(x=>x.id!==id);
    persist(); render();
    toast(`🗑 ${m.name} removido.`);
}

// ── Minha Escala (view do membro logado) ──
function minhaEscalaPage() {
    const member = S.currentMember;
    if (!member) return '<div style="padding:32px;text-align:center;color:var(--muted)">Nenhum membro logado.</div>';
    const todos    = getMemberEscalas(member.name);
    const upcoming = todos.filter(e=>e.daysUntil>=0);
    const past     = todos.filter(e=>e.daysUntil<0);
    function evCard(item, isPast) {
        const {ev, roles, daysUntil} = item;
        const whenLabel = daysUntil===0?'🔴 HOJE':daysUntil===1?'🟡 Amanhã':daysUntil<=7?`🟡 Em ${daysUntil} dias`:`Em ${daysUntil} dias`;
        const esc = S.escalas[ev.id] || {};
        const instrEmoji2 = {violao:'🎸',teclado:'🎹',bateria:'🥁',baixo:'🎸',guitarra:'🎸',sopro:'🎷',vocal1:'🎤',vocal2:'🎤',vocal3:'🎤',animador:'🎙'};
        const myRoleKeys = new Set(roles.map(r=>r.k));
        const teamMembers = EV_INSTR.filter(({k})=>esc[k] && !myRoleKeys.has(k));
        const teamHtml = teamMembers.length ? `
            <div style="margin-top:12px;padding:10px 12px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid var(--border)">
                <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:7px">👥 Time escalado</div>
                <div style="display:flex;flex-wrap:wrap;gap:6px">
                    ${teamMembers.map(({k,emoji,label})=>`<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:3px 9px;font-size:12px;color:var(--muted)"><span>${instrEmoji2[k]||emoji}</span><span>${esc[k]}</span></span>`).join('')}
                </div>
            </div>` : '';

        // ── Availability status ──────────────────────────────────────
        let availHtml = '';
        if (!isPast) {
            const avail = (S.availability[ev.id]||{})[member.id];
            const sub = S.substitutions.find(s=>s.fromId===member.id&&s.evId===ev.id&&s.status!=='rejected');
            if (avail === 'can') {
                availHtml = `<div style="margin-top:10px;display:flex;gap:6px;align-items:center">
                    <span style="background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#22c55e;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700">✅ Confirmado — Vou estar presente</span>
                    <button onclick="setAvailability('${ev.id}','${member.id}',null)" style="font-size:11px;background:none;border:none;color:var(--muted);cursor:pointer;text-decoration:underline">alterar</button>
                </div>`;
            } else if (avail === 'cannot') {
                availHtml = `<div style="margin-top:10px">
                    <span style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700">❌ Não posso comparecer</span>
                    ${sub ? `<div style="font-size:12px;color:var(--muted);margin-top:6px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:6px">
                        👤 Substituto indicado: <b style="color:var(--text)">${sub.toName}</b>
                        <span style="margin-left:6px;font-size:11px;font-weight:700;${sub.status==='accepted'?'color:#22c55e':sub.status==='rejected'?'color:#f87171':'color:#f59e0b'}">
                            ${sub.status==='accepted'?'✅ Aceitou e está escalado':sub.status==='rejected'?'❌ Recusou — indique outro':'⏳ Aguardando resposta'}
                        </span>
                        ${sub.status==='rejected'?`<br><button class="btn btn-ghost btn-sm" style="margin-top:6px;border-color:var(--gold);color:var(--gold);font-size:11px"
                            onclick="openSubPicker('${ev.id}','${member.id}','${roles.map(r=>r.k).join(',')}','${roles.map(r=>r.label).join(', ')}','${ev.title}','${evDateLabel(ev)}')"
                            >👤 Indicar outro substituto</button>`:''}
                    </div>` : `<button class="btn btn-ghost btn-sm" style="margin-top:6px;border-color:var(--gold);color:var(--gold);font-size:12px"
                        onclick="openSubPicker('${ev.id}','${member.id}','${roles.map(r=>r.k).join(',')}','${roles.map(r=>r.label).join(', ')}','${ev.title}','${evDateLabel(ev)}')"
                        >👤 Indicar substituto</button>`}
                    <button onclick="setAvailability('${ev.id}','${member.id}',null)" style="font-size:11px;background:none;border:none;color:var(--muted);cursor:pointer;text-decoration:underline;margin-left:8px">alterar</button>
                </div>`;
            } else {
                availHtml = `<div style="display:flex;gap:8px;margin-top:10px">
                    <button class="btn btn-sm" style="background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#22c55e;font-weight:700"
                        onclick="setAvailability('${ev.id}','${member.id}','can')">✅ Posso ir</button>
                    <button class="btn btn-sm" style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#f87171;font-weight:700"
                        onclick="setAvailability('${ev.id}','${member.id}','cannot')">❌ Não posso ir</button>

            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
                <div style="flex:1">
                    <div style="font-size:15px;font-weight:800;color:${isPast?'var(--muted)':'var(--text)'};margin-bottom:3px">${ev.title}</div>
                    <div style="font-size:12px;color:var(--muted)">📅 ${evDateLabel(ev)}${ev.horario?' · ⏰ '+ev.horario:''}</div>
                    <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">
                        ${roles.map(({emoji,label})=>`<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(94,96,206,.15);border:1px solid rgba(94,96,206,.3);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;color:#a5b4fc">${emoji} ${label} — você</span>`).join('')}
                    </div>
                    ${teamHtml}
                    ${availHtml}
                </div>
                ${!isPast?`<div style="font-size:12px;font-weight:700;background:rgba(255,212,0,.1);border:1px solid rgba(255,212,0,.3);color:var(--gold);padding:4px 10px;border-radius:8px;white-space:nowrap">${whenLabel}</div>`:''}
            </div>
        </div>`;
    }
    return `<div style="max-width:620px;margin:0 auto">
        <div style="text-align:center;padding:20px 0 24px">
            <div style="font-size:40px;margin-bottom:4px">🎯</div>
            <div style="font-size:22px;font-weight:900">Olá, ${member.name}!</div>
            <div style="font-size:13px;color:var(--muted);margin-top:4px">Suas escalas no Ministério de Música Hallel</div>
        </div>
        ${upcoming.length ? `
            <div style="font-size:13px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">🎯 Próximas Missões (${upcoming.length})</div>
            ${upcoming.map(e=>evCard(e,false)).join('')}

        ${past.length ? `
            <div style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px">📜 Missões Realizadas (${past.length})</div>
            ${past.slice(0,5).map(e=>evCard(e,true)).join('')}
        ` : ''}
    </div>`;
}

function saveFirstAccess(memberId) {
    const whats = document.getElementById('fa-whats')?.value?.trim();
    const email = document.getElementById('fa-email')?.value?.trim().toLowerCase();
    if (!whats) { toast('⚠️ Informe seu número de WhatsApp.'); return; }
    if (!email || !email.includes('@')) { toast('⚠️ Informe um email válido.'); return; }
    const member = S.members.find(m=>m.id===memberId);
    if (!member) return;
    member.whatsapp = whats;
    member.email = email;
    member.firstAccessDone = true;
    S.currentMember = member;
    persist();
    S.modal = null;
    render();
    toast(`✅ Cadastro completo! Bem-vindo ao ministério, ${member.name}! 🙏`);
    setTimeout(() => showMissionAlert(member), 600);
}

// ════════════════════════════════════════════════════
//  DISPONIBILIDADE & SUBSTITUIÇÃO
// ════════════════════════════════════════════════════

function setAvailability(evId, memberId, status) {
    if (!S.availability[evId]) S.availability[evId] = {};
    if (status === null) {
        delete S.availability[evId][memberId];
    } else {
        S.availability[evId][memberId] = status;
    }
    persist();
    // Refresh mission alert if open
    if (S.modal?.type === 'mission-alert') {
        S.modal.data.escalas = getMemberEscalas(S.currentMember.name).filter(e=>e.daysUntil>=0);
    }
    render();
}

function openSubPicker(evId, fromId, rolesStr, roleLabel, evTitle, evDate) {
    S.modal = { type: 'sub-picker', data: { evId, fromId, rolesStr, roleLabel, evTitle, evDate } };
    render();
}

function subPickerModal({ evId, fromId, rolesStr, roleLabel, evTitle, evDate }) {
    const fromMember = S.members.find(m=>m.id===fromId);
    const fromName = fromMember?.name || '';
    // Only show members with login, not the member themselves
    const candidates = S.members.filter(m => m.user && m.pass && m.id !== fromId);
    return `<div class="backdrop" onclick="closeModal(event)">
    <div class="modal" style="max-width:440px">
        <div class="modal-hd">
            <div class="modal-title">👤 Indicar Substituto</div>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:13px">
                <b>${fromName}</b> não poderá ir em <b>${evTitle}</b> (${evDate})<br>
                <span style="color:var(--muted);font-size:12px">Função: ${roleLabel}</span>
            </div>
            <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--muted)">Escolha quem pode substituir:</div>
            ${candidates.length === 0
                ? `<div style="color:var(--muted);font-size:13px;padding:16px;text-align:center">Nenhum membro disponível para indicar.</div>`
                : `<div style="display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto">
                    ${candidates.map(m => {

function indicarSubstituto(evId, fromId, toId, rolesStr, roleLabel, evTitle, evDate) {
    const fromMember = S.members.find(m=>m.id===fromId);
    const toMember   = S.members.find(m=>m.id===toId);
    if (!fromMember || !toMember) return;
    // Remove any previous pending substitution for this slot
    S.substitutions = S.substitutions.filter(s => !(s.fromId===fromId && s.evId===evId));
    S.substitutions.push({
        id: 'sub'+uid(),
        fromId, fromName: fromMember.name,
        toId,   toName:   toMember.name,
        evId, evTitle, evDate,
        role: rolesStr, roleLabel,
        status: 'pending',
        at: Date.now(),
        notifiedTo: false,
        notifiedFrom: false
    });
    persist();
    closeModal();
    toast(`✅ ${toMember.name} foi indicado como substituto!`);
    render();
}

function respondSubstitution(subId, accepted) {
    const sub = S.substitutions.find(s=>s.id===subId);
    if (!sub) return;
    sub.status = accepted ? 'accepted' : 'rejected';
    sub.notifiedFrom = false; // original member hasn't seen result yet
    if (accepted) {
        // Update the escala: replace the old member's name with the substitute's
        const esc = S.escalas[sub.evId];
        if (esc) {
            const roles = sub.role.split(',');
            roles.forEach(k => {
                if (esc[k] && esc[k].toLowerCase() === sub.fromName.toLowerCase()) {
                    esc[k] = sub.toName;
                }
            });
        }
    }
    persist();
    closeModal();
    toast(accepted ? '✅ Você confirmou a substituição!' : '❌ Substituição recusada.');
    render();
}

// Called on member login — check for pending notifications
function checkSubNotifications(member) {
    // 1. Substitution requests directed TO this member (pending)
    const pendingReqs = S.substitutions.filter(s =>
        s.toId === member.id && s.status === 'pending' && !s.notifiedTo
    );
    // 2. Results of substitutions FROM this member (accepted/rejected, not yet seen)
    const pendingResults = S.substitutions.filter(s =>
        s.fromId === member.id && (s.status==='accepted'||s.status==='rejected') && !s.notifiedFrom
    );

    if (pendingReqs.length > 0) {
        // Mark as notified so we don't show again
        pendingReqs.forEach(s => { s.notifiedTo = true; });
        persist();
        S.modal = { type: 'sub-request', data: { member, requests: pendingReqs } };
        render();
        return true;
    }
    if (pendingResults.length > 0) {
        pendingResults.forEach(s => { s.notifiedFrom = true; });
        persist();
        S.modal = { type: 'sub-result', data: { member, results: pendingResults } };
        render();
        return true;
    }
    return false;
}

    </div>`;

        if (!sec) return '—';
        if (sec < 60) return sec+'s';
        if (sec < 3600) return Math.floor(sec/60)+'min '+(sec%60)+'s';
        return Math.floor(sec/3600)+'h '+Math.floor((sec%3600)/60)+'min';
    }
    function fmtDate(ts) {
        if (!ts) return '—';
        const d = new Date(ts);
        return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

        const totalTime  = totalCifra + totalMusic + totalSong;

            <div style="display:flex;align-items:center;gap:8px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:20px;padding:5px 14px">
                <span style="font-size:14px">🤝</span>
                <span style="font-size:13px;font-weight:800;color:#f59e0b">Colaboradores</span>

            </div>
            <div style="flex:1;height:1px;background:rgba(245,158,11,.25)"></div>
        </div>
        ${colaboradores.map(memberCard).join('')}` : '';

    return `<div style="max-width:800px;margin:0 auto">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px">

            <button class="btn btn-ghost btn-sm" onclick="if(confirm('Limpar todo o histórico de atividade?')){S.activityLog=[];persist();render();}"
                style="color:#f87171;border-color:#f87171">🗑 Limpar histórico</button>
        </div>
        ${overviewSection}
        ${membrosSection}
        ${colaboradoresSection}
    </div>`;
}

function togglePw(id, pass) {

}

//  RELATÓRIO MENSAL
// ════════════════════════════════════════════════════
function relatorioPage() {
    const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const instrEmoji = {violao:'🎸',teclado:'🎹',bateria:'🥁',baixo:'🎸',guitarra:'🎸',sopro:'🎷',vocal1:'🎤',vocal2:'🎤',vocal3:'🎤',animador:'🎙'};
    const instrLabel = {violao:'Violão',teclado:'Teclado',bateria:'Bateria',baixo:'Baixo',guitarra:'Guitarra',sopro:'Sopro',vocal1:'Vocal 1',vocal2:'Vocal 2',vocal3:'Vocal 3',animador:'Animador'};

    const selMonth = S._relMonth ?? new Date().getMonth();

    function eventsForMonth(mo) {
        // One-time events
        const evs = EVENTOS_2026.filter(ev => {
            const m = parseInt(ev.start.split('-')[1]) - 1;
            return m === mo;
        });
        // Recurring for this month (unique by recId to show pattern once)
        const recDates = REC_2026.filter(ev => parseInt(ev.start.split('-')[1])-1 === mo);
        // Group recurring by recId
        const recGroups = {};
        recDates.forEach(ev => {
            if (!recGroups[ev.recId]) recGroups[ev.recId] = [];
            recGroups[ev.recId].push(ev);
        });
        return { evs, recGroups };
    }

    function fmtDate(ds) {
        const [y,m,d] = ds.split('-');
        return `${parseInt(d)}/${parseInt(m)}/${y}`;
    }

    function escalaBlock(esc, compact) {
        if (!esc) return '';
        const filled = EV_INSTR.filter(({k})=>esc[k]);
        if (!filled.length) return compact ? '' : `<span style="color:var(--muted);font-size:12px;font-style:italic">Sem escala definida</span>`;
        if (compact) {
            return filled.map(({k})=>`<span style="font-size:11px;margin-right:6px">${instrEmoji[k]} ${esc[k]}</span>`).join('');
        }
        return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:4px 12px;margin-top:6px">
            ${filled.map(({k})=>`<div style="display:flex;gap:6px;align-items:center;font-size:12px">
                <span style="color:var(--muted);white-space:nowrap">${instrEmoji[k]} ${instrLabel[k]}</span>
                <span style="font-weight:700;color:var(--text)">${esc[k]}</span>
            </div>`).join('')}
        </div>`;
    }

    function setListBlock(esc) {
        const slId = esc?.setListId;
        if (!slId) return '';
        const sl = S.setlists.find(x=>x.id===slId);
        if (!sl) return '';
        const songs = (sl.blocks||[]).flatMap(b=>(b.songIds||[]).map(id=>({
            song: S.songs.find(s=>s.id===id),
            voz: (b.vozes||{})[id]||''
        }))).filter(x=>x.song);
        if (!songs.length) return '';
        return `<div style="margin-top:8px;padding:8px 10px;background:rgba(0,150,63,.06);border-left:3px solid var(--purple);border-radius:0 6px 6px 0">
            <div style="font-size:10px;font-weight:700;color:var(--purple-light);text-transform:uppercase;margin-bottom:4px">🎵 Set List</div>
            ${songs.map((x,i)=>`<div style="font-size:12px;padding:1px 0">${i+1}. ${x.song.title}${x.song.key?` <span style="color:var(--muted)">(${x.song.key})</span>`:''}${x.voz?` <span style="color:var(--muted)">— 🎤 ${x.voz}</span>`:''}</div>`).join('')}
        </div>`;
    }

    const { evs, recGroups } = eventsForMonth(selMonth);
    const totalEvents = evs.length + Object.keys(recGroups).length;

    // Build event cards
    const eventCards = evs.map(ev => {
        const esc = S.escalas[ev.id]||{};
        const hasEsc = EV_INSTR.some(({k})=>esc[k]);
        const multiDay = ev.start !== ev.end;
        const dateLabel = multiDay ? `${fmtDate(ev.start)} a ${fmtDate(ev.end)}` : fmtDate(ev.start);
        return `<div class="rel-event-card ${ev.alegrai?'rel-alegrai':''}">
            <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap">
                <div style="flex:1;min-width:180px">
                    <div style="font-size:15px;font-weight:800;margin-bottom:2px;color:${ev.alegrai?'#F15A24':'var(--text)'}">${ev.alegrai?'⭐ ':''}${ev.title}</div>
                    <div style="font-size:12px;color:var(--muted)">📅 ${dateLabel}${ev.horario?' · ⏰ '+ev.horario:''}</div>
                </div>
                ${hasEsc?`<div style="font-size:10px;font-weight:700;background:rgba(0,150,63,.15);color:var(--purple-light);border:1px solid rgba(0,150,63,.25);padding:2px 8px;border-radius:8px;white-space:nowrap">✅ Com escala</div>`:'<div style="font-size:10px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);padding:2px 8px;border-radius:8px;white-space:nowrap">Sem escala</div>'}
            </div>
            ${escalaBlock(esc, false)}
            ${setListBlock(esc)}
        </div>`;
    });

    // Recurring groups
    const recCards = Object.entries(recGroups).map(([recId, dates]) => {
        const rec = RECORRENTES.find(r=>r.id===recId);
        if (!rec) return '';
        const weekName = rec.weekday===6?'Sábados':'Quintas';
        // Dates with individual escalas
        const dateRows = dates.map(ev => {
            const esc = S.escalas[ev.id]||{};
            const hasEsc = EV_INSTR.some(({k})=>esc[k]);
            return `<div style="padding:7px 10px;border-bottom:1px solid var(--border);${dates.indexOf(ev)===dates.length-1?'border-bottom:none':''}">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                    <span style="font-size:12px;font-weight:700;color:var(--muted);min-width:60px">${fmtDate(ev.start)}</span>
                    <span style="font-size:11px;color:var(--muted)">${rec.horario}</span>
                    <span style="margin-left:auto;font-size:10px;font-weight:700;${hasEsc?'color:var(--purple-light)':'color:var(--muted)'}">
                        ${hasEsc?'✅ escalado':'—'}
                    </span>
                </div>
                ${hasEsc ? `<div style="margin-top:4px">${escalaBlock(esc, true)}</div>` : ''}
                ${setListBlock(esc)}
            </div>`;
        }).join('');
        return `<div class="rel-event-card">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                <div style="width:10px;height:10px;border-radius:50%;background:${rec.color};flex-shrink:0"></div>
                <div>
                    <div style="font-size:15px;font-weight:800">${rec.title}</div>
                    <div style="font-size:12px;color:var(--muted)">Toda ${weekName} · ${rec.horario} · ${dates.length} ocorrência${dates.length>1?'s':''}</div>
                </div>
            </div>
            <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden">${dateRows}</div>
        </div>`;
    });

    const allCards = [...eventCards, ...recCards];

    // Month selector
    const monthSelector = `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px">
        ${MESES.map((m,i)=>`<button onclick="S._relMonth=${i};render()"
            class="btn btn-sm ${selMonth===i?'btn-primary':'btn-ghost'}">${m}</button>`).join('')}
    </div>`;

    return `<div style="max-width:860px;margin:0 auto" id="rel-page">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
            <h2 style="font-size:22px;font-weight:800">📄 Relatório Mensal</h2>
            <button class="btn btn-ghost btn-sm" style="color:#22c55e;border-color:#22c55e"
                onclick="printRelatorio('${MESES[selMonth]}')">
                🖨 Imprimir / Salvar PDF
            </button>
        </div>
        ${monthSelector}
        <div id="rel-content">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:14px 18px;background:linear-gradient(90deg,rgba(0,150,63,.12),transparent);border-left:4px solid var(--purple);border-radius:0 var(--radius) var(--radius) 0">
                <div style="font-size:28px">📅</div>
                <div>
                    <div style="font-size:20px;font-weight:900">${MESES[selMonth]} 2026</div>
                    <div style="font-size:13px;color:var(--muted)">${totalEvents} atividade${totalEvents!==1?'s':''} neste mês</div>
                </div>
            </div>
            ${allCards.length === 0
                ? `<div style="text-align:center;padding:48px;color:var(--muted)">Nenhuma atividade registrada para ${MESES[selMonth]}.</div>`
                : allCards.join('')}
        </div>
    </div>`;
}

function printRelatorio(mesNome) {
    const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const selMonth = (S._relMonth !== undefined) ? S._relMonth : 0;
    const content = document.getElementById('rel-content');
    if (!content) return;

    const instrEmoji = {violao:'🎸',teclado:'🎹',bateria:'🥁',baixo:'🎸',guitarra:'🎸',sopro:'🎷',vocal1:'🎤',vocal2:'🎤',vocal3:'🎤',animador:'🎙'};
    const instrLabel = {violao:'Violão',teclado:'Teclado',bateria:'Bateria',baixo:'Baixo',guitarra:'Guitarra',sopro:'Sopro',vocal1:'Vocal 1',vocal2:'Vocal 2',vocal3:'Vocal 3',animador:'Animador'};

    // Build a clean print window
    const win = window.open('','_blank','width=900,height=700');
    const evs = EVENTOS_2026.filter(ev => parseInt(ev.start.split('-')[1])-1 === selMonth);
    const recDates = REC_2026.filter(ev => parseInt(ev.start.split('-')[1])-1 === selMonth);
    const recGroups = {};
    recDates.forEach(ev => { if (!recGroups[ev.recId]) recGroups[ev.recId]=[];  recGroups[ev.recId].push(ev); });

    function fmtD(ds) { const [y,m,d]=ds.split('-'); return `${parseInt(d)}/${parseInt(m)}/${y}`; }
    function escHtml(esc) {
        if (!esc) return '<em style="color:#999">Sem escala</em>';
        const filled = EV_INSTR.filter(({k})=>esc[k]);
        if (!filled.length) return '<em style="color:#999">Sem escala definida</em>';
        return filled.map(({k})=>`<span style="display:inline-block;margin:2px 6px 2px 0;font-size:12px">${instrEmoji[k]} <b>${instrLabel[k]}:</b> ${esc[k]}</span>`).join('');
    }
    function slHtml(esc) {
        const sl = esc?.setListId && S.setlists.find(x=>x.id===esc.setListId);
        if (!sl) return '';
        const songs = (sl.blocks||[]).flatMap(b=>(b.songIds||[]).map(id=>({s:S.songs.find(x=>x.id===id),v:(b.vozes||{})[id]||''}))).filter(x=>x.s);
        if (!songs.length) return '';
        return `<div style="margin:8px 0 0;padding:8px;background:#f0faf4;border-left:3px solid #00963F;font-size:12px">
            <b style="color:#00963F">🎵 Set List:</b><br>
            ${songs.map((x,i)=>`${i+1}. ${x.s.title}${x.s.key?` (${x.s.key})`:''}${x.v?` — 🎤 ${x.v}`:''}`).join('<br>')}
        </div>`;
    }

    const evRows = evs.map(ev => {
        const esc = S.escalas[ev.id]||{};
        const multiDay = ev.start!==ev.end;
        const dt = multiDay?`${fmtD(ev.start)} a ${fmtD(ev.end)}`:fmtD(ev.start);
        return `<div class="ev-block">
            <div class="ev-title">${ev.alegrai?'⭐ ':''}${ev.title}</div>
            <div class="ev-meta">📅 ${dt}${ev.horario?' · ⏰ '+ev.horario:''}</div>
            <div class="ev-escala">${escHtml(esc)}</div>
            ${slHtml(esc)}
        </div>`;
    }).join('');

    const recRows = Object.entries(recGroups).map(([recId,dates])=>{
        const rec = RECORRENTES.find(r=>r.id===recId);
        if (!rec) return '';
        const rows = dates.map(ev => {
            const esc = S.escalas[ev.id]||{};
            return `<tr>
                <td style="padding:5px 10px;font-weight:600;white-space:nowrap;border-bottom:1px solid #eee">${fmtD(ev.start)}</td>
                <td style="padding:5px 10px;border-bottom:1px solid #eee">${escHtml(esc)}</td>
                <td style="padding:5px 10px;border-bottom:1px solid #eee">${slHtml(esc)}</td>
            </tr>`;
        }).join('');
        return `<div class="ev-block">
            <div class="ev-title">${rec.title}</div>
            <div class="ev-meta">Toda ${rec.weekday===6?'Sábado':'Quinta-feira'} · ${rec.horario}</div>
            <table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:12px">
                <thead><tr style="background:#f5f5f5">
                    <th style="padding:5px 10px;text-align:left;font-size:11px;text-transform:uppercase;color:#666">Data</th>
                    <th style="padding:5px 10px;text-align:left;font-size:11px;text-transform:uppercase;color:#666">Escalados</th>
                    <th style="padding:5px 10px;text-align:left;font-size:11px;text-transform:uppercase;color:#666">Set List</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
    }).join('');

    win.document.write(`<!DOCTYPE html><html lang="pt-BR"><head>
    <meta charset="UTF-8">
    <title>Relatório ${mesNome} 2026 — Ministério de Música Hallel</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; color:#1a1a1a; padding:32px; font-size:13px; }
        .header { border-bottom:3px solid #00963F; padding-bottom:16px; margin-bottom:28px; }
        .header h1 { font-size:22px; color:#00963F; margin-bottom:4px; }
        .header p { color:#666; font-size:13px; }
        .ev-block { margin-bottom:20px; padding:14px 16px; border:1px solid #e0e0e0; border-left:4px solid #00963F; border-radius:4px; page-break-inside:avoid; }
        .ev-title { font-size:16px; font-weight:700; margin-bottom:4px; }
