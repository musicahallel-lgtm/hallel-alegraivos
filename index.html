<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallel — Alegraivos</title>
    <style>
        :root {
            --purple: #7c3aed;
            --purple-light: #a78bfa;
            --purple-dark: #5b21b6;
            --gold: #f59e0b;
            --gold-light: #fcd34d;
            --bg:   #0c0c1d;
            --bg2:  #13132b;
            --bg3:  #1e1e3a;
            --bg4:  #252550;
            --border: #2d2d5e;
            --text:   #e2e2f0;
            --muted:  #8080a0;
            --green:  #10b981;
            --red:    #ef4444;
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text); min-height:100vh; overflow-x:hidden;
        }

        /* ── Header ── */
        .header {
            background: var(--bg2); border-bottom:1px solid var(--border);
            padding: 0 20px; position:sticky; top:0; z-index:100;
            display:flex; align-items:center; height:60px; gap:16px;
        }
        .logo { font-size:19px; font-weight:800; color:var(--gold); white-space:nowrap; }
        .logo span { color:var(--purple-light); }
        .nav { display:flex; gap:4px; flex:1; }
        .nav-btn {
            padding:8px 16px; border-radius:var(--radius-sm); border:none;
            background:transparent; color:var(--muted); cursor:pointer;
            font-size:14px; font-weight:600; transition:all .15s;
        }
        .nav-btn:hover { background:var(--bg3); color:var(--text); }
        .nav-btn.active { background:var(--purple); color:#fff; }
        .header-actions { display:flex; gap:8px; margin-left:auto; }

        /* ── Buttons ── */
        .btn {
            padding:9px 18px; border-radius:var(--radius-sm); border:none;
            cursor:pointer; font-size:14px; font-weight:600; transition:all .15s;
            display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
            font-family:inherit;
        }
        .btn-primary  { background:var(--purple); color:#fff; }
        .btn-primary:hover { background:var(--purple-light); color:#0c0c1d; }
        .btn-gold     { background:var(--gold); color:#1a0a00; }
        .btn-gold:hover { background:var(--gold-light); }
        .btn-ghost    { background:transparent; color:var(--muted); border:1px solid var(--border); }
        .btn-ghost:hover { background:var(--bg3); color:var(--text); }
        .btn-danger   { background:var(--red); color:#fff; }
        .btn-danger:hover { opacity:.85; }
        .btn-sm  { padding:6px 12px; font-size:13px; }
        .btn-icon{ padding:7px; }

        /* ── Main ── */
        .main { max-width:1200px; margin:0 auto; padding:24px 20px; }
        .section-header {
            display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;
        }
        .section-title { font-size:20px; font-weight:700; }
        .section-count {
            font-size:12px; color:var(--muted); background:var(--bg3);
            padding:3px 10px; border-radius:20px;
        }

        /* ── Toolbar ── */
        .toolbar { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
        .search-wrap { flex:1; min-width:200px; position:relative; }
        .search-wrap .si {
            position:absolute; left:12px; top:50%; transform:translateY(-50%);
            color:var(--muted); font-size:15px; pointer-events:none;
        }
        .search-input {
            width:100%; padding:10px 12px 10px 36px;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:var(--radius-sm); color:var(--text); font-size:14px;
        }
        .search-input:focus { outline:none; border-color:var(--purple); }
        select {
            padding:10px 12px; background:var(--bg3); border:1px solid var(--border);
            border-radius:var(--radius-sm); color:var(--text); font-size:14px; cursor:pointer;
        }
        select:focus { outline:none; border-color:var(--purple); }

        /* ── Song Grid ── */
        .songs-grid {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:14px;
        }
        .song-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); padding:16px;
            cursor:pointer; transition:all .15s; position:relative;
        }
        .song-card:hover {
            border-color:var(--purple); background:var(--bg3); transform:translateY(-2px);
            box-shadow:0 8px 30px rgba(124,58,237,.15);
        }
        .card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .song-num {
            background:var(--purple); color:#fff; width:28px; height:28px;
            border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-size:12px; font-weight:700; flex-shrink:0;
        }
        .key-badge {
            background:var(--bg4); color:var(--gold); padding:3px 8px;
            border-radius:4px; font-size:12px; font-weight:700;
        }
        .song-title { font-size:16px; font-weight:700; margin-bottom:3px; }
        .song-artist { font-size:13px; color:var(--muted); margin-bottom:10px; min-height:18px; }
        .song-tags { display:flex; gap:5px; flex-wrap:wrap; }
        .tag {
            font-size:11px; padding:2px 7px; border-radius:4px;
            background:var(--bg4); color:var(--muted); font-weight:500;
        }
        .tag-yt     { color:#ff5555; }
        .tag-sp     { color:#1DB954; }
        .tag-dz     { color:#ef5466; }
        .tag-bpm    { color:var(--green); }
        .tag-pdf    { color:#60a5fa; }
        .tag-moises { color:#f97316; }
        .moises-btn {
            display:flex; align-items:center; gap:10px; padding:12px 14px;
            background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(249,115,22,.05));
            border:1px solid rgba(249,115,22,.4); border-radius:var(--radius-sm);
            text-decoration:none; color:var(--text); transition:all .2s;
        }
        .moises-btn:hover { background:linear-gradient(135deg,rgba(249,115,22,.28),rgba(249,115,22,.1)); border-color:rgba(249,115,22,.7); }
        .moises-logo { font-size:20px; }
        .moises-label { font-weight:700; font-size:14px; color:#f97316; }
        .moises-desc  { font-size:11px; color:var(--muted); margin-top:1px; }

        /* ── Set List Cards ── */
        .setlist-grid {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px;
        }
        .setlist-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); padding:20px;
            cursor:pointer; transition:all .15s;
        }
        .setlist-card:hover { border-color:var(--purple); transform:translateY(-2px); }
        .setlist-name { font-size:18px; font-weight:700; margin-bottom:4px; }
        .setlist-date { font-size:13px; color:var(--muted); margin-bottom:10px; }
        .setlist-count { font-size:13px; color:var(--purple-light); font-weight:600; }
        .setlist-preview { margin-top:10px; font-size:13px; color:var(--muted); }
        .setlist-preview div { padding:2px 0; }

        /* ── Modal ── */
        .backdrop {
            position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:200;
            display:flex; align-items:flex-start; justify-content:center;
            padding:20px; overflow-y:auto;
        }
        .modal {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); width:100%; max-width:840px;
            margin:auto; position:relative;
        }
        .modal-hd {
            padding:20px 24px; border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:12px; flex-wrap:wrap;
        }
        .modal-title { font-size:20px; font-weight:700; flex:1; min-width:0; }
        .modal-body { padding:24px; }
        .modal-ft {
            padding:14px 24px; border-top:1px solid var(--border);
            display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap;
        }
        .close-btn {
            background:transparent; border:none; color:var(--muted);
            font-size:22px; cursor:pointer; padding:4px; line-height:1; flex-shrink:0;
        }
        .close-btn:hover { color:var(--text); }

        /* ── Form ── */
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .fg { display:flex; flex-direction:column; gap:6px; }
        .fg.full { grid-column:1/-1; }
        label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
        input[type=text],input[type=url],input[type=number],select.field,textarea {
            padding:10px 12px; background:var(--bg3); border:1px solid var(--border);
            border-radius:var(--radius-sm); color:var(--text); font-size:14px;
            font-family:inherit; width:100%;
        }
        input:focus,select.field:focus,textarea:focus { outline:none; border-color:var(--purple); }
        textarea {
            resize:vertical; min-height:130px; font-family:'Courier New',monospace;
            font-size:13px; line-height:1.7;
        }
        .divider { height:1px; background:var(--border); margin:4px 0; }

        /* ── PDF Upload Box ── */
        .pdf-upload-box {
            border:2px dashed var(--border); border-radius:var(--radius-sm);
            padding:20px; text-align:center; transition:all .2s; cursor:pointer;
            background:var(--bg3);
        }
        .pdf-upload-box:hover, .pdf-upload-box.drag { border-color:var(--purple); background:var(--bg4); }
        .pdf-upload-box input[type=file] { display:none; }
        .pdf-upload-icon { font-size:32px; margin-bottom:8px; }
        .pdf-upload-label { font-size:14px; font-weight:600; color:var(--text); margin-bottom:4px; }
        .pdf-upload-hint  { font-size:12px; color:var(--muted); }

        .pdf-badge {
            display:flex; align-items:center; gap:10px; padding:12px 14px;
            background:rgba(96,165,250,.1); border:1px solid rgba(96,165,250,.3);
            border-radius:var(--radius-sm);
        }
        .pdf-badge-icon { font-size:22px; }
        .pdf-badge-name { flex:1; font-size:13px; font-weight:600; color:#60a5fa; }
        .pdf-badge-size { font-size:11px; color:var(--muted); }

        /* ── Song Detail ── */
        .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
        .dsec { background:var(--bg3); border-radius:var(--radius-sm); overflow:hidden; }
        .dsec-title {
            padding:9px 14px; font-size:11px; font-weight:700; text-transform:uppercase;
            letter-spacing:.5px; color:var(--muted); border-bottom:1px solid var(--border);
            background:var(--bg4);
        }

        /* ── Cifra toggle ── */
        .cifra-toggle {
            display:flex; border-bottom:1px solid var(--border); background:var(--bg4);
        }
        .ctab {
            flex:1; padding:9px 12px; font-size:13px; font-weight:600; cursor:pointer;
            color:var(--muted); border:none; background:transparent; transition:all .15s;
            border-bottom:2px solid transparent; margin-bottom:-1px;
        }
        .ctab:hover { color:var(--text); }
        .ctab.active { color:var(--purple-light); border-bottom-color:var(--purple); }

        /* ── Player ── */
        .player-tabs { display:flex; border-bottom:1px solid var(--border); background:var(--bg4); }
        .ptab {
            padding:10px 14px; font-size:13px; font-weight:600; cursor:pointer;
            color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-1px;
            transition:all .15s; border:none; background:transparent;
        }
        .ptab:hover { color:var(--text); }
        .ptab.active { color:var(--purple-light); border-bottom-color:var(--purple); }
        .video-wrap { position:relative; padding-bottom:56.25%; height:0; }
        .video-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
        .player-ph { padding:40px; text-align:center; color:var(--muted); font-size:14px; }

        /* ── PDF viewer ── */
        .pdf-viewer {
            width:100%; height:420px; border:none; display:block; background:#fff;
        }
        .pdf-viewer-wrap { padding:0; }
        .pdf-no-preview {
            padding:30px; text-align:center; color:var(--muted); font-size:14px;
        }
        .pdf-actions {
            padding:10px 14px; display:flex; gap:8px; align-items:center;
            border-top:1px solid var(--border); background:var(--bg4);
        }

        /* ── Chord Chart ── */
        .chord-chart {
            padding:14px 16px; font-family:'Courier New',monospace; font-size:13px;
            line-height:1.8; white-space:pre-wrap; word-break:break-word; min-height:180px;
        }
        .ch { color:var(--gold); font-weight:700; }
        .transpose-bar {
            display:flex; align-items:center; gap:8px; padding:10px 14px;
            border-top:1px solid var(--border); background:var(--bg4);
        }
        .t-label { font-size:12px; color:var(--muted); font-weight:600; }
        .t-offset { min-width:60px; text-align:center; font-size:14px; font-weight:700; color:var(--gold); }

        /* ── Links ── */
        .links-list { padding:10px; display:flex; flex-direction:column; gap:6px; }
        .link-item {
            display:flex; align-items:center; gap:10px; padding:10px 12px;
            background:var(--bg4); border-radius:var(--radius-sm); text-decoration:none;
            color:var(--text); font-size:13px; transition:all .15s;
        }
        .link-item:hover { background:var(--border); }
        .link-label { font-weight:600; }
        .link-desc  { font-size:11px; color:var(--muted); }

        /* ── Set List Editor ── */
        .sl-editor { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        .col-hd {
            font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase;
            letter-spacing:.5px; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border);
        }
        .sl-item {
            display:flex; align-items:center; gap:8px; padding:10px 12px;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:var(--radius-sm); margin-bottom:6px;
        }
        .sl-num { color:var(--gold); font-weight:700; font-size:14px; min-width:22px; }
        .sl-title { flex:1; font-size:14px; font-weight:600; }
        .sl-key { font-size:11px; color:var(--gold); background:var(--bg4); padding:2px 6px; border-radius:4px; }
        .avail-list { overflow-y:auto; max-height:460px; display:flex; flex-direction:column; gap:5px; }
        .avail-item {
            display:flex; align-items:center; gap:10px; padding:10px 12px;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:var(--radius-sm); cursor:pointer; transition:all .15s;
        }
        .avail-item:hover { border-color:var(--purple); }
        .avail-item.in-list { opacity:.38; cursor:default; pointer-events:none; }

        /* ── Print View ── */
        .print-view {
            background:#fff; color:#111; padding:36px;
            font-family:Georgia,serif; border-radius:var(--radius-sm);
        }
        .ph { text-align:center; margin-bottom:28px; border-bottom:2px solid #222; padding-bottom:18px; }
        .ph-title { font-size:26px; font-weight:bold; margin-bottom:4px; }
        .ph-sub { font-size:13px; color:#555; }
        .plist { list-style:none; }
        .plist li {
            display:flex; align-items:center; gap:14px; padding:13px 0;
            border-bottom:1px solid #eee; font-size:15px;
        }
        .pnum {
            width:30px; height:30px; background:#111; color:#fff;
            border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-size:13px; font-weight:bold; flex-shrink:0;
        }
        .p-title { flex:1; font-weight:bold; }
        .p-key { font-size:13px; color:#555; }
        .p-bpm { font-size:12px; color:#999; }

        /* ── Meta row ── */
        .meta-row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
        .meta-it { display:flex; align-items:center; gap:6px; font-size:14px; }
        .meta-lb { color:var(--muted); }
        .meta-vl { font-weight:700; }
        .meta-vl.key { color:var(--gold); font-size:18px; }

        /* ── Toast ── */
        .toast {
            position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
            background:var(--bg3); border:1px solid var(--border); color:var(--text);
            padding:12px 20px; border-radius:var(--radius-sm); font-size:14px;
            font-weight:500; z-index:999; animation:slideUp .2s ease; white-space:nowrap;
        }
        @keyframes slideUp {
            from { transform:translateX(-50%) translateY(20px); opacity:0; }
            to   { transform:translateX(-50%) translateY(0);    opacity:1; }
        }

        /* ── Empty state ── */
        .empty { text-align:center; padding:60px 20px; color:var(--muted); }
        .empty .ei { font-size:48px; margin-bottom:14px; }
        .empty h3  { font-size:18px; margin-bottom:8px; color:var(--text); }
        .empty p   { font-size:14px; }

        /* ── Playlist ── */
        .pl-topbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
        .pl-tabs { display:flex; background:var(--bg3); border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--border); }
        .pl-tabs .ptab { border-radius:0; border-bottom:none; padding:9px 16px; }
        .pl-tabs .ptab.active { background:var(--purple); color:#fff; border-bottom-color:transparent; }
        .pl-body { display:grid; grid-template-columns:1fr 320px; gap:20px; align-items:start; }
        .pl-left { display:flex; flex-direction:column; gap:12px; }
        .pl-player-box {
            background:#000; border-radius:var(--radius); overflow:hidden;
            min-height:240px; display:flex; align-items:center; justify-content:center;
        }
        .pl-player-box .video-wrap { width:100%; }
        .pl-spotify-wrap { background:var(--bg2); border-radius:var(--radius); overflow:hidden; }
        .pl-no-media { padding:48px 20px; text-align:center; color:var(--muted); font-size:14px; }
        .pl-info-bar {
            background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
            padding:16px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;
        }
        .pl-now-title  { font-size:18px; font-weight:700; }
        .pl-now-artist { font-size:13px; color:var(--muted); margin-top:2px; }
        .pl-now-meta   { display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
        .pl-nav {
            background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
            padding:12px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px;
        }
        .pl-counter { font-size:13px; color:var(--muted); font-weight:600; }
        .pl-right { display:flex; flex-direction:column; }
        .pl-q-hd {
            font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase;
            letter-spacing:.5px; padding-bottom:8px; border-bottom:1px solid var(--border); margin-bottom:8px;
        }
        .pl-queue { max-height:540px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
        .pl-q-item {
            display:flex; align-items:center; gap:10px; padding:10px 12px;
            background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-sm);
            cursor:pointer; transition:all .15s;
        }
        .pl-q-item:hover { border-color:var(--purple); background:var(--bg3); }
        .pl-q-item.now  { border-color:var(--purple); background:var(--bg4); }
        .pl-q-num { min-width:22px; text-align:center; font-size:13px; font-weight:700; color:var(--muted); }
        .pl-q-item.now .pl-q-num { color:var(--purple-light); }
        .pl-q-title { font-size:14px; font-weight:600; }
        .pl-q-artist { font-size:12px; color:var(--muted); }
        .pl-q-info { flex:1; }
        .pl-empty-q { padding:30px; text-align:center; color:var(--muted); font-size:13px; }
        #pl-yt-div { width:100%; aspect-ratio:16/9; }
        @media(max-width:840px){ .pl-body { grid-template-columns:1fr; } }

        /* ── Responsive ── */
        @media(max-width:640px){
            .form-grid,.detail-grid,.sl-editor { grid-template-columns:1fr; }
            .logo { font-size:15px; }
            .nav-btn { padding:6px 10px; font-size:13px; }
        }

        /* ── Print media ── */
        @media print {
            body * { visibility:hidden; }
            .print-view,.print-view * { visibility:visible; }
            .print-view { position:absolute; left:0; top:0; width:100%; }
            .modal-ft { display:none; }
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const S = {
    page: 'library',
    songs: [],
    setlists: [],
    modal: null,
    q: '',
    filterKey: '',
    transpose: 0,
    ptab: 'youtube',
    cifraTab: 'texto',     // 'texto' | 'pdf'
    currentPdfUrl: null,   // blob URL for current detail
    hasPdf: new Set(),     // song IDs that have PDF stored
    // pending form state
    pendingPdfFile: null,  // File object waiting to be saved
    pendingPdfRemove: false,
    pl: { source: 'all', platform: 'youtube', idx: 0 },
};

// ═══════════════════════════════════════════════
//  INDEX DB  (PDF storage — no size limit)
// ═══════════════════════════════════════════════
let DB = null;
let ytPL = null; // YouTube IFrame API player instance for playlist

window.onYouTubeIframeAPIReady = function() {
    if (S.page === 'playlist' && S.pl.platform === 'youtube') initYTPL();
};

function openDB() {
    return new Promise((res, rej) => {
        const req = indexedDB.open('hallel_db', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('pdfs');
        req.onsuccess = e => { DB = e.target.result; res(DB); };
        req.onerror = rej;
    });
}

function dbSavePDF(songId, file) {
    return new Promise(async (res, rej) => {
        const buf = await file.arrayBuffer();
        const tx = DB.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').put({ buf, name: file.name, size: file.size }, songId);
        tx.oncomplete = res;
        tx.onerror = rej;
    });
}

function dbGetPDF(songId) {
    return new Promise((res) => {
        const tx = DB.transaction('pdfs', 'readonly');
        const req = tx.objectStore('pdfs').get(songId);
        req.onsuccess = () => res(req.result || null);
        req.onerror = () => res(null);
    });
}

function dbDeletePDF(songId) {
    return new Promise((res) => {
        const tx = DB.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').delete(songId);
        tx.oncomplete = res;
        tx.onerror = res;
    });
}

function dbHasPDF(songId) {
    return new Promise((res) => {
        const tx = DB.transaction('pdfs', 'readonly');
        const req = tx.objectStore('pdfs').count(songId);
        req.onsuccess = () => res(req.result > 0);
        req.onerror = () => res(false);
    });
}

async function loadPdfIndex() {
    return new Promise((res) => {
        const tx = DB.transaction('pdfs', 'readonly');
        const req = tx.objectStore('pdfs').getAllKeys();
        req.onsuccess = () => { S.hasPdf = new Set(req.result); res(); };
        req.onerror = res;
    });
}

// ═══════════════════════════════════════════════
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(v) { return (v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function ytId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([^&\n?#]+)/);
    return m ? m[1] : null;
}
function spId(url) {
    if (!url) return null;
    const m = url.match(/spotify\.com\/(?:intl-[a-z]+\/)?track\/([a-zA-Z0-9]+)/);
    return m ? m[1] : null;
}
function dzId(url) {
    if (!url) return null;
    const m = url.match(/deezer\.com\/(?:[a-z]+\/)?track\/(\d+)/);
    return m ? m[1] : null;
}

// Chord transposition
const SH = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FL = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
function tNote(n, d) {
    let i = SH.indexOf(n); if (i===-1) i=FL.indexOf(n); if (i===-1) return n;
    return SH[((i+d)%12+12)%12];
}
function tChord(c, d) {
    const m = c.match(/^([A-G][b#]?)(.*)$/);
    return m ? tNote(m[1],d)+m[2] : c;
}
function tText(txt, d) {
    if (!d) return txt;
    return txt.replace(/\[([A-G][b#]?[^\]]*)\]/g, (_,c)=>'['+tChord(c,d)+']');
}
function fmtChord(txt) {
    return txt.replace(/\[([A-G][b#]?[^\]]*)\]/g, (_,c)=>`<span class="ch">[${c}]</span>`);
}
function fmtLines(txt) { return txt.split('\n').map(fmtChord).join('\n'); }
function offsetLbl(n)  { return n===0?'Original':(n>0?'+':'')+n; }
function fmtSize(b)    { return b > 1048576 ? (b/1048576).toFixed(1)+' MB' : Math.round(b/1024)+' KB'; }

const KEYS = ['C','C#/Db','D','D#/Eb','E','F','F#/Gb','G','G#/Ab','A','A#/Bb','B'];

function toast(msg) {
    document.querySelectorAll('.toast').forEach(el=>el.remove());
    const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
    document.body.appendChild(el); setTimeout(()=>el.remove(),2600);
}

function nav(p)  { S.page=p; render(); }

function closeModal(e) {
    if (e && e.target!==e.currentTarget) return;
    // revoke blob URL to free memory
    if (S.currentPdfUrl) { URL.revokeObjectURL(S.currentPdfUrl); S.currentPdfUrl=null; }
    S.modal=null; S.transpose=0; S.ptab='youtube'; S.cifraTab='texto';
    S.pendingPdfFile=null; S.pendingPdfRemove=false;
    render();
}

// Songs
async function openDetail(id) {
    const s=S.songs.find(x=>x.id===id); if (!s) return;
    S.transpose=0;
    const hasPdf = S.hasPdf.has(id);
    S.cifraTab = hasPdf ? 'pdf' : 'texto';
    S.ptab = ytId(s.youtubeUrl)?'youtube': spId(s.spotifyUrl)?'spotify': dzId(s.deezerUrl)?'deezer':'youtube';
    // Load PDF from IDB
    if (S.currentPdfUrl) { URL.revokeObjectURL(S.currentPdfUrl); S.currentPdfUrl=null; }
    if (hasPdf) {
        const rec = await dbGetPDF(id);
        if (rec) {
            const blob = new Blob([rec.buf], {type:'application/pdf'});
            S.currentPdfUrl = URL.createObjectURL(blob);
        }
    }
    S.modal={type:'detail',data:s}; render();
}

function openAdd() {
    S.pendingPdfFile=null; S.pendingPdfRemove=false;
    S.modal={type:'add',data:null}; render();
}
function openEdit(id) {
    const s=S.songs.find(x=>x.id===id); if(!s)return;
    S.pendingPdfFile=null; S.pendingPdfRemove=false;
    S.modal={type:'add',data:{...s}}; render();
}

async function saveSong(eid) {
    const title=document.getElementById('f_title')?.value?.trim();
    if (!title) { toast('⚠️ Título é obrigatório!'); return; }
    const d = {
        id: eid||uid(), title,
        artist:   document.getElementById('f_artist')?.value?.trim()||'',
        key:      document.getElementById('f_key')?.value||'',
        bpm:      parseInt(document.getElementById('f_bpm')?.value)||0,
        category: document.getElementById('f_cat')?.value?.trim()||'',
        youtubeUrl: document.getElementById('f_yt')?.value?.trim()||'',
        spotifyUrl: document.getElementById('f_sp')?.value?.trim()||'',
        deezerUrl:  document.getElementById('f_dz')?.value?.trim()||'',
        moisesUrl:  document.getElementById('f_mo')?.value?.trim()||'',
        reaperUrl:  document.getElementById('f_rp')?.value?.trim()||'',
        bandUrl:    document.getElementById('f_bd')?.value?.trim()||'',
        chords:  document.getElementById('f_ch')?.value||'',
        notes:   document.getElementById('f_nt')?.value?.trim()||'',
    };

    // Handle PDF
    if (S.pendingPdfFile) {
        await dbSavePDF(d.id, S.pendingPdfFile);
        S.hasPdf.add(d.id);
        toast('✅ Música e PDF salvos!');
    } else if (S.pendingPdfRemove) {
        await dbDeletePDF(d.id);
        S.hasPdf.delete(d.id);
        toast('✅ Música salva (PDF removido).');
    } else {
        toast(eid ? '✅ Música atualizada!' : '✅ Música adicionada!');
    }

    if (eid) { const i=S.songs.findIndex(s=>s.id===eid); if(i!==-1) S.songs[i]=d; }
    else     { S.songs.push(d); }

    persist();
    S.modal=null; S.pendingPdfFile=null; S.pendingPdfRemove=false;
    render();
}

async function delSong(id) {
    if (!confirm('Excluir esta música?')) return;
    S.songs = S.songs.filter(s=>s.id!==id);
    S.setlists.forEach(sl=>{ sl.songIds=sl.songIds.filter(x=>x!==id); });
    if (S.hasPdf.has(id)) { await dbDeletePDF(id); S.hasPdf.delete(id); }
    persist(); S.modal=null; toast('🗑 Música excluída.'); render();
}

// PDF picks
function onPdfPick(input) {
    const f = input.files?.[0]; if (!f) return;
    S.pendingPdfFile = f;
    S.pendingPdfRemove = false;
    render();
}
function onPdfDrop(e) {
    e.preventDefault();
    document.getElementById('pdfDropZone')?.classList.remove('drag');
    const f = e.dataTransfer?.files?.[0];
    if (f && f.type==='application/pdf') { S.pendingPdfFile=f; render(); }
    else toast('⚠️ Envie um arquivo .pdf');
}
function clearPendingPdf() { S.pendingPdfFile=null; render(); }
function markPdfRemove()   { S.pendingPdfRemove=true; S.pendingPdfFile=null; render(); }
function cancelPdfRemove() { S.pendingPdfRemove=false; render(); }

// Transpose
function doT(d, reset) {
    if (reset) S.transpose=0; else S.transpose+=d;
    const song=S.modal?.data; if(!song) return;
    const transposed=tText(song.chords||'',S.transpose);
    const cc=document.getElementById('cc');
    const to=document.getElementById('toff');
    if(cc) cc.innerHTML=fmtLines(transposed);
    if(to) to.textContent=offsetLbl(S.transpose);
}

}
function openSL(id)  { const sl=S.setlists.find(x=>x.id===id); if(!sl)return; S.modal={type:'sl',data:sl}; render(); }
function openPrint(id){ const sl=S.setlists.find(x=>x.id===id); if(!sl)return; S.modal={type:'print',data:sl}; render(); }

function editSLMeta(id) {
    const sl=S.setlists.find(x=>x.id===id); if(!sl)return;
    const name=prompt('Nome:',sl.name); if(name===null)return;
    const date=prompt('Data:',sl.date||''); if(date===null)return;
    sl.name=name.trim()||sl.name; sl.date=date.trim();
    persist(); S.modal={type:'sl',data:sl}; render();
}
function delSL(id) {
    if(!confirm('Excluir este set list?'))return;
    S.setlists=S.setlists.filter(x=>x.id!==id);
    persist(); S.modal=null; toast('🗑 Set list excluído.'); render();
}
function slAdd(slId,songId) {
    const sl=S.setlists.find(x=>x.id===slId); if(!sl||sl.songIds.includes(songId))return;
    sl.songIds.push(songId); persist(); S.modal={type:'sl',data:sl}; render();
}
function slDel(slId,songId) {
    const sl=S.setlists.find(x=>x.id===slId); if(!sl)return;
    sl.songIds=sl.songIds.filter(x=>x!==songId); persist(); S.modal={type:'sl',data:sl}; render();
}
function slMove(slId,songId,dir) {
    const sl=S.setlists.find(x=>x.id===slId); if(!sl)return;
    const i=sl.songIds.indexOf(songId); if(i===-1)return;
    const j=i+dir; if(j<0||j>=sl.songIds.length)return;
    [sl.songIds[i],sl.songIds[j]]=[sl.songIds[j],sl.songIds[i]];
    persist(); S.modal={type:'sl',data:sl}; render();
}

function plSongs() {
    const plat = S.pl.platform;
    const hasUrl = s => {
        if (plat === 'youtube') return !!ytId(s.youtubeUrl);
        if (plat === 'spotify') return !!spId(s.spotifyUrl);
        if (plat === 'deezer')  return !!dzId(s.deezerUrl);
        return false;
    };
    if (S.pl.source === 'all') return S.songs.filter(hasUrl);
    const sl = S.setlists.find(x => x.id === S.pl.source);
    if (!sl) return S.songs.filter(hasUrl);
    return sl.songIds.map(id => S.songs.find(s => s.id === id)).filter(Boolean).filter(hasUrl);
}

function plInfoHtml(song) {
    if (!song) return '<div style="color:var(--muted);font-size:14px">Nenhuma música selecionada</div>';
    return `<div style="flex:1">
        <div class="pl-now-title">${song.title}</div>
        ${song.artist ? `<div class="pl-now-artist">${song.artist}</div>` : ''}
        <div class="pl-now-meta">
            ${song.key  ? `<span class="tag tag-bpm" style="color:var(--gold)">Tom: ${song.key}</span>` : ''}
            ${song.bpm  ? `<span class="tag tag-bpm">♩ ${song.bpm} BPM</span>` : ''}
            ${song.category ? `<span class="tag">${song.category}</span>` : ''}
        </div>
    </div>`;
}

function playlistPage() {
    const songs  = plSongs();
    const idx    = Math.min(S.pl.idx, Math.max(0, songs.length - 1));
    S.pl.idx     = idx;
    const song   = songs[idx] || null;
    const plat   = S.pl.platform;
    const source = S.pl.source;

    // Build player HTML (YouTube uses a target div; Spotify/Deezer use iframes)
    let playerHtml = '';
    if (!song) {
        playerHtml = `<div class="pl-no-media">Nenhuma música com ${plat} cadastrado.<br><small>Cadastre links na Biblioteca.</small></div>`;
    } else if (plat === 'youtube') {
        const vid = ytId(song.youtubeUrl);
        playerHtml = vid
            ? `<div class="video-wrap"><div id="pl-yt-div"></div></div>`
            : `<div class="pl-no-media">Esta música não tem YouTube</div>`;
    } else if (plat === 'spotify') {
        const sid = spId(song.spotifyUrl);
        playerHtml = sid
            ? `<div class="pl-spotify-wrap"><iframe id="pl-embed" src="https://open.spotify.com/embed/track/${sid}" height="232" frameborder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" style="width:100%"></iframe></div>`
            : `<div class="pl-no-media">Esta música não tem Spotify</div>`;
    } else if (plat === 'deezer') {
        const did = dzId(song.deezerUrl);
        playerHtml = did
            ? `<div class="pl-spotify-wrap"><iframe id="pl-embed" src="https://widget.deezer.com/widget/dark/track/${did}" height="232" frameborder="0" style="width:100%"></iframe></div>`
            : `<div class="pl-no-media">Esta música não tem Deezer</div>`;
    }

    return `
    <div class="pl-topbar">
        <h2 class="section-title">▶ Playlist</h2>
        <div class="pl-tabs">
            <button class="ptab ${plat==='youtube'?'active':''}" onclick="plSetPlatform('youtube')">▶ YouTube</button>
            <button class="ptab ${plat==='spotify'?'active':''}" onclick="plSetPlatform('spotify')">● Spotify</button>
            <button class="ptab ${plat==='deezer'?'active':''}"  onclick="plSetPlatform('deezer')">♫ Deezer</button>
        </div>
        <select onchange="plSetSource(this.value)" style="margin-left:auto">
            <option value="all" ${source==='all'?'selected':''}>📚 Todas as músicas</option>
            ${S.setlists.map(sl => `<option value="${sl.id}" ${source===sl.id?'selected':''}>${sl.name}</option>`).join('')}
        </select>
    </div>

    <div class="pl-body">
        <!-- Player column -->
        <div class="pl-left">
            <div class="pl-player-box">${playerHtml}</div>

            <div class="pl-info-bar" id="pl-info">
                ${plInfoHtml(song)}
            </div>

            <div class="pl-nav">
                <button id="pl-prev" class="btn btn-ghost" onclick="plPrev()" ${idx===0?'disabled':''}>◀ Anterior</button>
                <span class="pl-counter" id="pl-counter">${songs.length > 0 ? `${idx+1} / ${songs.length}` : '—'}</span>
                <button id="pl-next" class="btn btn-ghost" onclick="plNext()" ${idx>=songs.length-1?'disabled':''}>Próxima ▶</button>
            </div>
        </div>

        <!-- Queue column -->
        <div class="pl-right">
            <div class="pl-q-hd">🎵 Fila — ${songs.length} música${songs.length!==1?'s':''}</div>
            <div class="pl-queue" id="pl-queue">
                ${songs.length === 0
                    ? `<div class="pl-empty-q">Nenhuma música tem link de ${plat}.<br>Cadastre links na Biblioteca.</div>`
                    : songs.map((s, i) => `
                    <div class="pl-q-item ${i===idx?'now':''}" onclick="plGoTo(${i})">
                        <div class="pl-q-num">${i===idx?'▶':i+1}</div>
                        <div class="pl-q-info">
                            <div class="pl-q-title">${s.title}</div>
                            ${s.artist?`<div class="pl-q-artist">${s.artist}</div>`:''}
                        </div>
                        ${s.key?`<span class="sl-key">${s.key}</span>`:''}
                    </div>`).join('')}
            </div>
        </div>
    </div>`;
}

// Called after playlist page renders — creates the YouTube IFrame player
function afterPLRender() {
    if (S.pl.platform !== 'youtube') return;
    const div = document.getElementById('pl-yt-div');
    if (!div) return;
    const songs = plSongs();
    const song  = songs[S.pl.idx];
    const vid   = song ? ytId(song.youtubeUrl) : null;
    if (!vid) return;

    if (window.YT && YT.Player) {
        ytPL = new YT.Player('pl-yt-div', {
            videoId: vid,
            playerVars: { rel: 0, autoplay: 0, modestbranding: 1 },
            events: { onStateChange: e => { if (e.data === YT.PlayerState.ENDED) plNext(); } }
        });
    }
}

// ── Playlist actions ──
function plSetPlatform(p) { ytPL = null; S.pl.platform = p; S.pl.idx = 0; render(); }
function plSetSource(v)   { ytPL = null; S.pl.source = v;   S.pl.idx = 0; render(); }

function plGoTo(idx) {
    const songs = plSongs();
    if (idx < 0 || idx >= songs.length) return;
    S.pl.idx = idx;
    const song = songs[idx];
    const plat = S.pl.platform;

    // Update player without full re-render
    if (plat === 'youtube' && ytPL && ytPL.loadVideoById) {
        const vid = ytId(song.youtubeUrl);
        if (vid) ytPL.loadVideoById(vid);
    } else if ((plat === 'spotify' || plat === 'deezer') && song) {
        const iframe = document.getElementById('pl-embed');
        if (iframe) {
            const src = plat === 'spotify'
                ? `https://open.spotify.com/embed/track/${spId(song.spotifyUrl)}`
                : `https://widget.deezer.com/widget/dark/track/${dzId(song.deezerUrl)}`;
            iframe.src = src;
        }
    }

    // Patch info bar
    const infoEl = document.getElementById('pl-info');
    if (infoEl) infoEl.innerHTML = plInfoHtml(song);

    // Patch counter
    const ctrEl = document.getElementById('pl-counter');
    if (ctrEl) ctrEl.textContent = `${idx+1} / ${songs.length}`;

    // Patch prev/next buttons
    const prev = document.getElementById('pl-prev');
    const next = document.getElementById('pl-next');
    if (prev) prev.disabled = idx === 0;
    if (next) next.disabled = idx >= songs.length - 1;

    // Patch queue highlight
    document.querySelectorAll('.pl-q-item').forEach((el, i) => {
        el.classList.toggle('now', i === idx);
        el.querySelector('.pl-q-num').textContent = i === idx ? '▶' : i + 1;
        if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    });
}

function plNext() { plGoTo(S.pl.idx + 1); }
function plPrev() { plGoTo(S.pl.idx - 1); }

(async () => {

    await loadPdfIndex();
    // Load YouTube IFrame API (async, no blocking)
    const ytScript = document.createElement('script');
    ytScript.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(ytScript);
    render();
})();
</script>
