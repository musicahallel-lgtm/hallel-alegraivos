function agendaPage() {
    const today = new Date(); today.setHours(0,0,0,0);
    const dismissed = JSON.parse(localStorage.getItem('hl_notif_dismissed')||'[]');

    // Member context: which events is the current member escalated for?
    const myEscalas = isMembro() && S.currentMember
        ? new Set(getMemberEscalas(S.currentMember.name).map(x => x.ev.id))
        : new Set();

    // Events in next 15 days (not dismissed)
    const upcoming = EVENTOS_2026.filter(ev => {
        const d = evDaysUntil(ev);
        return d >= 0 && d <= 15 && !dismissed.includes(ev.id);
    });

    // Build set of dates with events for quick lookup
    const evByDate = {};    // one-time events
    const recByDate = {};   // recurring events
    EVENTOS_2026.forEach(ev => {
        const s = new Date(ev.start+'T00:00:00');
        const e = new Date(ev.end+'T00:00:00');
        for (let d = new Date(s); d <= e; d.setDate(d.getDate()+1)) {
            const k = d.toISOString().slice(0,10);
            if (!evByDate[k]) evByDate[k] = [];
            evByDate[k].push(ev);
        }
    });
    REC_2026.forEach(ev => {
        if (!recByDate[ev.start]) recByDate[ev.start] = [];
        recByDate[ev.start].push(ev);
    });

    // Notification banner
    let notifHtml = '';
    if (upcoming.length) {
        const items = upcoming.map(ev => {
            const d = evDaysUntil(ev);
            const when = d === 0 ? 'HOJE' : d === 1 ? 'amanhã' : `em ${d} dias`;
            return `<div class="agenda-notif-item">🔔 <b>${ev.title}</b> — ${when} (${evDateLabel(ev)})<br>
            <span style="font-size:12px;opacity:.85">Esteja disponível para esta missão da Comunidade Hallel!</span></div>`;
        }).join('');
        notifHtml = `<div class="agenda-notif">
            <div class="agenda-notif-icon">⚠️</div>
            <div style="flex:1">
                <div class="agenda-notif-title">Eventos nos próximos 15 dias</div>
                ${items}
            </div>
            <button class="agenda-notif-dismiss" onclick="agendaDismiss([${upcoming.map(e=>"'"+e.id+"'").join(',')}])">✕ Dispensar</button>
        </div>`;
    }

    // Mini-calendar year (12 months)
    let calHtml = '<div class="year-grid">';
    for (let m = 0; m < 12; m++) {
        const firstDay = new Date(2026, m, 1).getDay(); // 0=Sun
        const daysInMonth = new Date(2026, m+1, 0).getDate();
        calHtml += `<div class="month-card">
            <div class="month-hd">${MESES_PT[m]}</div>
            <div class="cal-week-hd">${DIAS_PT.map(d=>`<div class="cal-wday">${d}</div>`).join('')}</div>
            <div class="cal-days">`;
        // leading blanks
        for (let i = 0; i < firstDay; i++) calHtml += '<div class="cal-day other"></div>';
        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `2026-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const isToday = dateStr === today.toISOString().slice(0,10);
            const hasEv = !!evByDate[dateStr];
            const isPast = new Date(dateStr+'T00:00:00') < today && !isToday;
            const hasRec = !!recByDate[dateStr];
            const recTip = hasRec ? recByDate[dateStr].map(e=>e.title+' ('+e.horario+')').join(', ') : '';
            const tip = [hasEv?evByDate[dateStr].map(e=>e.title).join(', '):'', recTip].filter(Boolean).join(' | ');
            const isAlegrai = hasEv && evByDate[dateStr].some(e=>e.alegrai);
            const isMissa = hasRec && recByDate[dateStr].some(e=>e.missa);
            const isMy = hasEv && evByDate[dateStr].some(e => myEscalas.has(e.id));
            const cls = [isToday?'today':'', isAlegrai?'has-alegrai':hasEv?'has-ev':'', hasRec?'has-rec':'', isMissa?'rec-missa':'', isPast?'past':'', isMy?'my-escala':''].filter(Boolean).join(' ');
            const clickEv  = hasEv  ? `openEvModal('${evByDate[dateStr][0].id}')` : '';
            const clickRec = hasRec ? `openRecModal('${recByDate[dateStr][0].recId}','${dateStr}')` : '';
            const click = (hasEv||hasRec) ? `onclick="${clickEv||clickRec}"` : '';
            calHtml += `<div class="cal-day ${cls}" title="${tip}" ${click}>${day}</div>`;
        }
        calHtml += '</div></div>';
    }
    calHtml += '</div>';

    // Event list grouped by month
    const evByMonth = {};
    EVENTOS_2026.forEach(ev => {
        const mo = parseInt(ev.start.split('-')[1]) - 1;
        if (!evByMonth[mo]) evByMonth[mo] = [];
        evByMonth[mo].push(ev);
    });
    let listHtml = '';
    for (let m = 0; m < 12; m++) {
        const evs = evByMonth[m]; if (!evs) continue;
        listHtml += `<div class="ev-list-section">
            <div class="ev-month-title">📅 ${MESES_PT[m]}</div>`;
        evs.forEach(ev => {
            const d = evDaysUntil(ev);
            const isPast = d < 0;
            const isUp = d >= 0 && d <= 15;
            const esc = S.escalas[ev.id];
            const hasCl = esc?.checklist?.length > 0;
            const clDone = hasCl ? esc.checklist.filter(i=>i.done).length : 0;
            const clTotal = hasCl ? esc.checklist.length : 0;
            const isMine = myEscalas.has(ev.id);
            const alegraiBadge = ev.alegrai ? `<div style="font-size:10px;font-weight:800;background:linear-gradient(90deg,#FFD400,#F15A24);color:#fff;padding:2px 8px;border-radius:8px;white-space:nowrap">⭐ DESTAQUE</div>` : '';
            const myBadge = isMine ? `<div style="font-size:10px;font-weight:800;background:linear-gradient(90deg,var(--purple),var(--purple-light));color:#fff;padding:2px 8px;border-radius:8px;white-space:nowrap">🎯 Você está escalado</div>` : '';
            // Show team for member when escalated
            let teamHtml = '';
            if (isMine && esc) {
                const team = EV_INSTR.filter(({k})=>esc[k]).map(({k,emoji,label})=>`<span style="font-size:11px;color:var(--muted)">${emoji} <b style="color:var(--text)">${esc[k]}</b></span>`);
                if (team.length) teamHtml = `<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;padding:6px 8px;background:rgba(0,150,63,.06);border-radius:6px;border:1px solid rgba(0,150,63,.15)">${team.join('')}</div>`;
            }
            listHtml += `<div class="ev-item ${ev.alegrai?'ev-alegrai-card':''} ${isMine&&!isPast?'ev-mine':''} ${isUp&&!ev.alegrai&&!isMine?'upcoming':''} ${isPast?'past':''}" onclick="openEvModal('${ev.id}')" style="cursor:pointer">
                <div class="ev-dot"></div>
                <div class="ev-date" style="${ev.alegrai?'color:#F15A24;font-weight:800':isMine?'color:var(--purple-light);font-weight:700':''}">
                    ${isMine&&!isPast?'📍 ':''} ${evDateLabel(ev)}
                </div>
                <div class="ev-title">${ev.title}</div>
                <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                    ${alegraiBadge}
                    ${myBadge}
                    ${hasCl&&!isMembro()?`<span style="font-size:11px;color:${clDone===clTotal?'var(--purple-light)':'var(--muted)'}">✅ ${clDone}/${clTotal}</span>`:''}
                    ${isUp ? `<div class="ev-badge">${d===0?'HOJE':d===1?'amanhã':d+' dias'}</div>` : ''}
                </div>
                ${teamHtml}
            </div>`;
        });
        listHtml += '</div>';
    }

    // Semanais
    const recSumHtml = `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">
        ${RECORRENTES.map(r=>`<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);border-left:4px solid ${r.color}">
            <div style="width:10px;height:10px;border-radius:50%;background:${r.color};flex-shrink:0"></div>
            <div>
                <div style="font-size:13px;font-weight:700;color:${r.color}">${r.weekday===6?'Todo Sábado':'Toda Quinta'} — ${r.title}</div>
                <div style="font-size:12px;color:var(--muted)">⏰ ${r.horario}</div>
            </div>
        </div>`).join('')}
    </div>`;

    return `<div class="agenda-wrap">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
            <h2 style="font-size:22px;font-weight:800">📅 Agenda Hallel 2026</h2>
            <span style="font-size:13px;color:var(--muted)">${EVENTOS_2026.length} eventos + semanais</span>
        </div>
        ${recSumHtml}
        ${notifHtml}
        ${calHtml}
        <div style="margin-top:4px">${listHtml}</div>
    </div>`;
}

function openEvModal(evId) {
    const ev = EVENTOS_2026.find(e=>e.id===evId); if(!ev) return;
    S.modal = {type:'evento', data:ev}; S.evTab='escala'; render();
}

function openRecModal(recId, dateStr) {
    const rec = RECORRENTES.find(r=>r.id===recId); if(!rec) return;
    const [y,m,d] = dateStr.split('-');
    const label = `${parseInt(d)}/${parseInt(m)} — ${rec.horario}`;
    // Reuse evento modal passing a synthetic event object
    const ev = { id: recId+'-'+dateStr, recId, title: rec.title, start: dateStr, end: dateStr,
                 horario: rec.horario, recurring: true, dateLabel: label };
    S.modal = {type:'evento', data:ev}; S.evTab='escala'; render();
}

const EV_INSTR = [
    {k:'violao',emoji:'🎸',label:'Violão'},{k:'teclado',emoji:'🎹',label:'Teclado'},
    {k:'bateria',emoji:'🥁',label:'Bateria'},{k:'baixo',emoji:'🎸',label:'Baixo'},
    {k:'guitarra',emoji:'🎸',label:'Guitarra'},{k:'sopro',emoji:'🎷',label:'Sopro'},
    {k:'vocal1',emoji:'🎤',label:'Vocal 1'},{k:'vocal2',emoji:'🎤',label:'Vocal 2'},
    {k:'vocal3',emoji:'🎤',label:'Vocal 3'},{k:'animador',emoji:'🎙',label:'Animador'},
];

function eventoModal(ev) {
    const esc = S.escalas[ev.id] || {};
    const cl  = esc.checklist || [];
    const tab = S.evTab;
    const done = cl.filter(i=>i.done).length;
    const hasEsc = EV_INSTR.some(({k})=>esc[k]);

    // ── Escala: ADM edits, others read-only ──────────────────────────────
    let escalaHtml = '';
    if (isAdm()) {
        const membersWithLogin = S.members.filter(m => m.user && m.pass);
        const dlId = 'dl-ev-'+ev.id;
        const linkedSl = S.escalas[ev.id]?.setListId && S.setlists.find(x=>x.id===S.escalas[ev.id].setListId);
        escalaHtml = `
        <datalist id="${dlId}">${membersWithLogin.map(m=>`<option value="${m.name}">`).join('')}</datalist>
        <div class="escal-grid" style="margin-bottom:16px">
            ${EV_INSTR.map(({k,emoji,label})=>{
                const instrMatch = membersWithLogin.filter(m => {
                    const instrs = m.instruments || (m.instrument ? [m.instrument] : []);
                    if (k==='vocal1'||k==='vocal2'||k==='vocal3') return instrs.some(i=>i==='vocal1'||i==='vocal2'||i==='vocal3');
                    return instrs.includes(k);
                });
                const thisDl = instrMatch.length ? `dl-${k}-${ev.id}` : dlId;
                return `${instrMatch.length?`<datalist id="${thisDl}">${instrMatch.map(m=>`<option value="${m.name}">`).join('')}</datalist>`:''}
                <div class="escal-row">
                    <div class="escal-inst">${emoji} ${label}</div>
                    <input class="escal-input" type="text" placeholder="—" list="${thisDl}"
                        value="${(esc[k]||'').replace(/"/g,'&quot;')}"
                        onchange="saveEvEscalado('${ev.id}','${k}',this.value)"
                        onblur="saveEvEscalado('${ev.id}','${k}',this.value)">
                </div>`;
            }).join('')}
        </div>
        ${membersWithLogin.length===0?`<div style="background:rgba(241,90,36,.08);border:1px solid rgba(241,90,36,.25);border-radius:8px;padding:10px 12px;font-size:12px;color:#f97316;margin-bottom:12px">
            ⚠️ Nenhum membro com acesso cadastrado ainda. <button class="btn btn-ghost btn-sm" style="color:#f97316;border-color:#f97316;margin-left:6px" onclick="closeModal();nav('membros')">Cadastrar membros →</button>
        </div>`:''}
        ${membersWithLogin.length>0&&membersWithLogin.length<S.members.length?`<div style="background:rgba(255,212,0,.07);border:1px solid rgba(255,212,0,.2);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--muted);margin-bottom:12px">
            💡 Sugestões: apenas membros com acesso (${membersWithLogin.length}/${S.members.length})
        </div>`:''}
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
            <button class="btn btn-primary" style="flex:1;min-width:160px" onclick="gerarChecklist('${ev.id}')">
                ✅ ${cl.length?'Atualizar Checklist':'Gerar Checklist'}
            </button>
            ${linkedSl
                ? `<button class="btn" style="flex:1;min-width:160px;background:#1a7a3c;color:#fff;display:flex;align-items:center;gap:6px;justify-content:center" onclick="verSetListDoEvento('${ev.id}')">✅ Ver Set List →</button>`
                : `<button class="btn btn-ghost btn-sm" style="flex:1;min-width:160px;border:1px solid var(--purple);color:var(--purple-light)" onclick="subirParaSetList('${ev.id}')">📋 Subir para Set List</button>`}
        </div>
        ${hasEsc ? `<button class="btn btn-sm" style="margin-top:10px;width:100%;background:#25d366;color:#fff;font-weight:700;font-size:14px" onclick="openWaEscala('${ev.id}')">
            📲 Notificar escalados via WhatsApp
        </button>` : ''}`;
    } else {
        // Read-only view for membros/geral
        const myName = S.currentMember?.name?.toLowerCase() || '';
        const filled = EV_INSTR.filter(({k})=>esc[k]);
        escalaHtml = `
        <div class="escal-grid" style="margin-bottom:12px">
            ${filled.length === 0
                ? `<div style="color:var(--muted);font-size:13px;font-style:italic;padding:10px 0">Escala ainda não definida para este evento.</div>`
                : filled.map(({k,emoji,label})=>{
                    const val = esc[k]||'';
                    const isMine = myName && val.toLowerCase().includes(myName);
                    return `<div class="escal-row" style="pointer-events:none">
                        <div class="escal-inst">${emoji} ${label}</div>
                        <div class="escal-input" style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:${isMine?'800':'500'};color:${isMine?'var(--purple-light)':'var(--text)'};background:${isMine?'rgba(0,150,63,.1)':'transparent'};border-color:${isMine?'rgba(0,150,63,.3)':'var(--border)'}">
                            ${isMine?'⭐ ':''}${val}
                        </div>
                    </div>`;
                }).join('')}
        </div>`;
    }

    // ── Checklist ────────────────────────────────────────────────────────
    const checkHtml = cl.length === 0
        ? `<div style="padding:28px;text-align:center;color:var(--muted)">
            Nenhum item ainda.${isAdm()?`<br><br><button class="btn btn-ghost btn-sm" onclick="setEvTab('escala')">← Preencha a Escala primeiro</button>`:''}
           </div>`
        : `<div style="margin-bottom:12px;display:flex;align-items:center;gap:8px">
            <span style="font-size:13px;color:var(--muted)">${done}/${cl.length} concluídos</span>
            <div style="flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${cl.length?Math.round(done/cl.length*100):0}%;background:var(--purple);transition:width .3s"></div>
            </div>
           </div>
           <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">
               ${cl.map(item=>`
               <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid ${item.done?'var(--purple)':'var(--border)'}">
                   <input type="checkbox" ${item.done?'checked':''} onchange="toggleCheckItem('${ev.id}','${item.id}')"
                       style="width:18px;height:18px;accent-color:var(--purple);cursor:pointer;flex-shrink:0">
                   <span style="flex:1;font-size:13px;${item.done?'text-decoration:line-through;color:var(--muted)':''}">${item.text}</span>
                   ${isAdm()?`<button class="btn btn-ghost btn-sm btn-icon" onclick="deleteCheckItem('${ev.id}','${item.id}')">✕</button>`:''}
               </div>`).join('')}
           </div>
           ${isAdm()?`<div style="display:flex;gap:8px">
               <input class="field" id="new-check-input" placeholder="Adicionar tarefa…" style="flex:1"
                   onkeydown="if(event.key==='Enter')addCheckItem('${ev.id}')">
               <button class="btn btn-ghost btn-sm" onclick="addCheckItem('${ev.id}')">+ Adicionar</button>
           </div>`:''}`;

    return `<div class="backdrop" onclick="closeModal(event)">
    <div class="modal" style="max-width:600px">
        <div class="modal-hd">
            <div style="flex:1">
                <div class="modal-title">${ev.recurring?'🔄':'📅'} ${ev.title}</div>
                <div style="font-size:13px;color:var(--muted);margin-top:2px">
                    ${ev.dateLabel || evDateLabel(ev)}
                    ${ev.horario?` · ⏰ ${ev.horario}`:''}
                    ${ev.recurring?` · <span style="color:var(--gold)">Evento semanal</span>`:''}
                </div>
            </div>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <div style="display:flex;gap:4px;margin-bottom:16px">
                <button class="btn ${tab==='escala'?'btn-primary':'btn-ghost'} btn-sm" onclick="setEvTab('escala')">🎼 Escala</button>
                <button class="btn ${tab==='checklist'?'btn-primary':'btn-ghost'} btn-sm" onclick="setEvTab('checklist')">
                    ✅ Checklist ${cl.length?`<span style="background:rgba(255,255,255,.25);border-radius:8px;padding:0 6px;font-size:11px">${done}/${cl.length}</span>`:''}
                </button>
            </div>
            ${tab==='escala' ? escalaHtml : checkHtml}
        </div>
    </div></div>`;
}

function setEvTab(tab) { S.evTab=tab; render(); }

function waEscalaModal({ evId }) {

`🎼 *ESCALA — ${ev.title.toUpperCase()}*
📅 ${dateStr}${horario ? `\n⏰ ${horario}` : ''}

${teamLines.join('\n')}

Preparados para servir! 🙌🏻
_— Ministério de Música Hallel_`;

    // ── Individual messages ──────────────────────────────────────────────

        const phone = member?.whatsapp?.replace(/\D/g,'');
        const myRole = `${instrEmoji[k]} ${instrLabel[k]}`;

        const msg =
`Olá, *${name}*! 🎶

Você está escalado(a) para:
📅 *${ev.title}* — ${dateStr}${horario ? `\n⏰ ${horario}` : ''}

🎯 *Sua função:* ${myRole}

*Time escalado:*
${teamLines.join('\n')}

Se prepare com carinho! 🙏
_— Ministério de Música Hallel_`;

        const url = phone

        return { name, role: myRole, phone, url, hasPhone: !!phone };
    });

    const allHavePhone = individuals.every(i=>i.hasPhone);
    const missingPhone = individuals.filter(i=>!i.hasPhone);

    return `<div class="backdrop" onclick="closeModal(event)">

function copyWaText(text) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(()=>toast('📋 Texto copiado!'));
    } else {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        toast('📋 Texto copiado!');
    }
}

function saveEvEscalado(evId, key, val) {
    if (!S.escalas[evId]) S.escalas[evId] = {};
    S.escalas[evId][key] = val.trim();
    // Sync escalados to linked set list if it exists
    const slId = S.escalas[evId].setListId;
    if (slId) {
        const sl = S.setlists.find(x=>x.id===slId);
        if (sl) { if(!sl.escalados) sl.escalados={}; sl.escalados[key] = val.trim(); }
    }
    if (S.modal?.data?.id===evId) S.modal.data = EVENTOS_2026.find(e=>e.id===evId);
    persist();
}

function criarSetListDoEvento(evId) {
    const ev = EVENTOS_2026.find(e=>e.id===evId) || REC_2026.find(e=>e.id===evId);
    if (!ev) return null;
    if (!S.escalas[evId]) S.escalas[evId] = {};
    const esc = S.escalas[evId];
    // If already linked to an existing set list, skip
    if (esc.setListId && S.setlists.find(sl=>sl.id===esc.setListId)) return null;
    const dateLabel = evDateLabel(ev);
    const newSL = {
        id: 'sl'+uid(),
        name: ev.title + ' — ' + dateLabel,
        date: ev.start,
        blocks: [{ id: 'b'+uid(), name: 'Geral', songIds: [], vozes: {} }],
        escalados: {}
    };
    EV_INSTR.forEach(({k}) => { newSL.escalados[k] = esc[k] || ''; });
    S.setlists.push(newSL);
    esc.setListId = newSL.id;
    persist();
    return newSL;
}

function verSetListDoEvento(evId) {
    const esc = S.escalas[evId];
    if (!esc?.setListId) return;
    closeModal();
    nav('setlists');
    setTimeout(() => openSL(esc.setListId), 80);
}

function subirParaSetList(evId) {
    const newSL = criarSetListDoEvento(evId);
    if (newSL) {
        render();
        toast(`📋 Set List criado: "${newSL.name}". Abra Set Lists para adicionar músicas.`);
    } else {
        toast('Set List já existe para este evento.');
    }
}

function gerarChecklist(evId) {
    const ev = EVENTOS_2026.find(e=>e.id===evId); if(!ev) return;
    if (!S.escalas[evId]) S.escalas[evId] = {};
    const esc = S.escalas[evId];
    const existing = esc.checklist || [];
    const existingTexts = new Set(existing.map(i=>i.text));
    const newItems = [];

    // Auto-items from escala
    EV_INSTR.forEach(({k,label}) => {
        const nome = esc[k];
        if (!nome) return;
        const text = `Confirmar ${label} — ${nome}`;
        if (!existingTexts.has(text)) newItems.push({id:'ck'+uid(),text,done:false});
    });

    // Default preparation items (only if not already present)
    const defaults = [
        `Preparar set list para: ${ev.title}`,
        'Verificar e montar equipamentos',
        'Passagem de som / soundcheck',
        'Oração antes do evento',
    ];
    defaults.forEach(text => {
        if (!existingTexts.has(text)) newItems.push({id:'ck'+uid(),text,done:false});
    });

    esc.checklist = [...existing, ...newItems];
    persist();
    S.evTab = 'checklist';
    render();
    toast(`✅ Checklist ${existing.length?'atualizado':'criado'} para: ${ev.title}`);
}

function toggleCheckItem(evId, itemId) {
    const cl = S.escalas[evId]?.checklist; if(!cl) return;
    const item = cl.find(i=>i.id===itemId); if(!item) return;
    item.done = !item.done;
    persist(); render();
}

function addCheckItem(evId) {
    const input = document.getElementById('new-check-input');
    const text = input?.value?.trim(); if(!text) return;
    if (!S.escalas[evId]) S.escalas[evId] = {};
    if (!S.escalas[evId].checklist) S.escalas[evId].checklist = [];
    S.escalas[evId].checklist.push({id:'ck'+uid(), text, done:false});
    persist(); render();
}

function deleteCheckItem(evId, itemId) {
    const esc = S.escalas[evId]; if(!esc?.checklist) return;
    esc.checklist = esc.checklist.filter(i=>i.id!==itemId);
    persist(); render();
}

function agendaDismiss(ids) {
    const dismissed = JSON.parse(localStorage.getItem('hl_notif_dismissed')||'[]');
    ids.forEach(id => { if (!dismissed.includes(id)) dismissed.push(id); });
    localStorage.setItem('hl_notif_dismissed', JSON.stringify(dismissed));
    render();
}

function plSongs() {
    const plat = S.pl.platform;
    const hasUrl = s => {
        if (plat === 'youtube') return !!ytId(s.youtubeUrl);
        if (plat === 'spotify') return !!spId(s.spotifyUrl);
        if (plat === 'deezer')  return !!dzId(s.deezerUrl);
        return false;
    };
    if (S.pl.source === 'all') return S.songs.filter(hasUrl);
    const sl = S.setlists.find(x => x.id === S.pl.source);
    if (!sl) return S.songs.filter(hasUrl);
    const allIds = (sl.blocks||[]).flatMap(b=>b.songIds||[]);
    return allIds.map(id => S.songs.find(s => s.id === id)).filter(Boolean).filter(hasUrl);
}

function plInfoHtml(song) {
    if (!song) return '<div style="color:var(--muted);font-size:14px">Nenhuma música selecionada</div>';
    return `<div style="flex:1">
        <div class="pl-now-title">${song.title}</div>
        ${song.artist ? `<div class="pl-now-artist">${song.artist}</div>` : ''}
        <div class="pl-now-meta">
            ${song.key  ? `<span class="tag tag-bpm" style="color:var(--gold)">Tom: ${song.key}</span>` : ''}
            ${song.bpm  ? `<span class="tag tag-bpm">♩ ${song.bpm} BPM</span>` : ''}
            ${song.category ? `<span class="tag">${song.category}</span>` : ''}
        </div>
    </div>`;
}

// Called after playlist page renders — creates the YouTube IFrame player
function afterPLRender() {
    if (S.pl.platform !== 'youtube') return;
    const div = document.getElementById('pl-yt-div');
    if (!div) return;
    const songs = plSongs();
    const song  = songs[S.pl.idx];
    const vid   = song ? ytId(song.youtubeUrl) : null;
    if (!vid) return;

    if (window.YT && YT.Player) {
        ytPL = new YT.Player('pl-yt-div', {
            videoId: vid,
            playerVars: { rel: 0, autoplay: 0, modestbranding: 1 },
            events: { onStateChange: e => { if (e.data === YT.PlayerState.ENDED) plNext(); } }
        });
    }
}

// ── Playlist actions ──
function plSetPlatform(p) { ytPL = null; S.pl.platform = p; S.pl.idx = 0; render(); }
function plSetSource(v)   { ytPL = null; S.pl.source = v;   S.pl.idx = 0; render(); }
function plFromSL(slId)   { ytPL = null; S.pl.source = slId; S.pl.idx = 0; S.modal = null; S.page = 'playlist'; render(); }

function plGoTo(idx) {
    const songs = plSongs();
    if (idx < 0 || idx >= songs.length) return;
    S.pl.idx = idx;
    const song = songs[idx];
    const plat = S.pl.platform;

    // Update player without full re-render
    if (plat === 'youtube' && ytPL && ytPL.loadVideoById) {
        const vid = ytId(song.youtubeUrl);
        if (vid) ytPL.loadVideoById(vid);
    } else if ((plat === 'spotify' || plat === 'deezer') && song) {
        const iframe = document.getElementById('pl-embed');
        if (iframe) {
            const src = plat === 'spotify'
                ? `https://open.spotify.com/embed/track/${spId(song.spotifyUrl)}`
                : `https://widget.deezer.com/widget/dark/track/${dzId(song.deezerUrl)}`;
            iframe.src = src;
        }
    }

    // Patch info bar
    const infoEl = document.getElementById('pl-info');
    if (infoEl) infoEl.innerHTML = plInfoHtml(song);

    // Patch counter
    const ctrEl = document.getElementById('pl-counter');
    if (ctrEl) ctrEl.textContent = `${idx+1} / ${songs.length}`;

    // Patch prev/next buttons
    const prev = document.getElementById('pl-prev');
    const next = document.getElementById('pl-next');
    if (prev) prev.disabled = idx === 0;
    if (next) next.disabled = idx >= songs.length - 1;

    // Patch queue highlight
    document.querySelectorAll('.pl-q-item').forEach((el, i) => {
        el.classList.toggle('now', i === idx);
        el.querySelector('.pl-q-num').textContent = i === idx ? '▶' : i + 1;
        if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    });
}

function plNext() { plGoTo(S.pl.idx + 1); }
function plPrev() { plGoTo(S.pl.idx - 1); }

//  STEM MIXER  (Web Audio API)
// ═══════════════════════════════════════════════
const MIXERS = {}; // songId → mixer state

const STEM_META = {
    vocals:        { label:'Voz',         emoji:'🎤' },
    backing_vocals:{ label:'Back Vocal',  emoji:'🎤' },
    drums:         { label:'Bateria',     emoji:'🥁' },
    bass:          { label:'Baixo',       emoji:'🎸' },
    electric:      { label:'Elétrica',    emoji:'🎸' },
    acoustic:      { label:'Acústica',    emoji:'🎸' },
    piano:         { label:'Piano',       emoji:'🎹' },
    keys:          { label:'Keys',        emoji:'⌨️' },
    strings:       { label:'Cordas',      emoji:'🎻' },
    wind:          { label:'Sopros',      emoji:'🎷' },
    metronome:     { label:'Metrônomo',   emoji:'🎚' },
    lead:          { label:'Guitarra Lead', emoji:'🎸' },
    rhythm:        { label:'Guitarra Ritmo', emoji:'🎸' },
    other:         { label:'Outros',      emoji:'🔊' },
};

const MISSA_BLOCKS = [
    'Canto de Entrada','Ato Penitencial','Hino de Louvor',
    'Aclamação ao Evangelho','Ofertório','Santo','Amém',
    'Cordeiro','Comunhão','Pós Comunhão','Canto Final','Outros'
];

async function initMixer(songId, stemsPath) {
    if (MIXERS[songId]) { showMixerUI(songId); return; }

    // Esconde botão, mostra barra de progresso
    const loadBtn = document.getElementById(`mixer-load-btn-${songId}`);
    const progWrap = document.getElementById(`mixer-prog-wrap-${songId}`);
    const progBar  = document.getElementById(`mixer-prog-bar-${songId}`);
    const progLabel= document.getElementById(`mixer-prog-label-${songId}`);
    if (loadBtn) loadBtn.style.display = 'none';
    if (progWrap) progWrap.style.display = 'block';

    const stemNames = Object.keys(STEM_META);
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const tracks = [];
    let loaded = 0;

    // Carrega um stem por vez para mostrar progresso real
    for (const name of stemNames) {
        try {
            const res = await fetch(`${stemsPath}/${name}.mp3`);
            if (!res.ok) continue;
            const buf = await res.arrayBuffer();
            const decoded = await ctx.decodeAudioData(buf);
            const gain = ctx.createGain();
            gain.connect(ctx.destination);
            tracks.push({ name, decoded, gain, muted: false, solo: false, vol: 1 });
            loaded++;
            const pct = Math.round((loaded / stemNames.length) * 100);
            if (progBar)   progBar.style.width = pct + '%';
            if (progLabel) progLabel.textContent = `Carregando… ${loaded} de ${stemNames.length}`;
        } catch { /* stem não existe, pula */ }
    }

    if (!tracks.length) {
        if (progLabel) progLabel.textContent = '⚠️ Stems não encontrados.';
        return;
    }

    MIXERS[songId] = { ctx, tracks, playing: false, startTime: 0, offset: 0,
        duration: tracks[0].decoded.duration, raf: null };
    buildMixerUI(songId);
    showMixerUI(songId);
}

function buildMixerUI(songId) {
    const m = MIXERS[songId];
    const stemsEl = document.getElementById(`mixer-stems-${songId}`);
    if (!stemsEl) return;
    stemsEl.innerHTML = m.tracks.map(t => {
        const meta = STEM_META[t.name] || { label: t.name, emoji: '🔊' };
        return `<div class="stem-row" id="stemrow-${songId}-${t.name}">
            <span class="stem-emoji">${meta.emoji}</span>
            <div class="stem-name-vol">
                <span class="stem-name">${meta.label}</span>
                <input type="range" class="stem-vol" min="0" max="1" step="0.01" value="1"
                    oninput="stemVol('${songId}','${t.name}',this.value)">
            </div>
            <button class="stem-btn" id="stem-m-${songId}-${t.name}" onclick="stemMute('${songId}','${t.name}')">M</button>
            <button class="stem-btn" id="stem-s-${songId}-${t.name}" onclick="stemSolo('${songId}','${t.name}')">S</button>
        </div>`;
    }).join('');
    updateMixerTime(songId);
}

function showMixerUI(songId) {
    const progWrap = document.getElementById(`mixer-prog-wrap-${songId}`);
    const ui = document.getElementById(`mixer-ui-${songId}`);
    if (progWrap) progWrap.style.display = 'none';
    if (ui) ui.style.display = 'block';
}

function mixerToggle(songId) {
    const m = MIXERS[songId];
    if (!m) return;
    if (m.playing) { mixerPause(songId); } else { mixerPlay(songId); }
}

function mixerPlay(songId) {
    const m = MIXERS[songId];
    if (!m || m.playing) return;
    if (m.ctx.state === 'suspended') m.ctx.resume();
    const when = m.ctx.currentTime;
    m.sources = m.tracks.map(t => {
        const src = m.ctx.createBufferSource();
        src.buffer = t.decoded;
        src.connect(t.gain);
        src.start(when, m.offset);
        return src;
    });
    m.startTime = when - m.offset;
    m.playing = true;
    document.getElementById(`mixer-play-${songId}`).textContent = '⏸';
    mixerTick(songId);
}

function mixerPause(songId) {
    const m = MIXERS[songId];
    if (!m || !m.playing) return;
    m.offset = m.ctx.currentTime - m.startTime;
    m.sources?.forEach(s => { try { s.stop(); } catch {} });
    m.playing = false;
    cancelAnimationFrame(m.raf);
    document.getElementById(`mixer-play-${songId}`).textContent = '▶';
}

function mixerSeek(e, songId) { /* legado */ }
function mixerSeekRange(input, songId) {
    const m = MIXERS[songId];
    if (!m) return;
    m.offset = (input.value / 1000) * m.duration;
    if (m.playing) { mixerPause(songId); mixerPlay(songId); }
    updateMixerTime(songId);
}

function mixerTick(songId) {
    const m = MIXERS[songId];
    if (!m || !m.playing) return;
    updateMixerTime(songId);
    m.raf = requestAnimationFrame(() => mixerTick(songId));
}

function updateMixerTime(songId) {
    const m = MIXERS[songId];
    if (!m) return;
    const cur = Math.min(m.playing ? m.ctx.currentTime - m.startTime : m.offset, m.duration);
    const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
    const pct = m.duration > 0 ? cur / m.duration : 0;
    const timeEl = document.getElementById(`mixer-time-${songId}`);
    const seekEl = document.getElementById(`mixer-prog-${songId}`);
    if (timeEl) timeEl.textContent = `${fmt(cur)} / ${fmt(m.duration)}`;
    if (seekEl) {
        seekEl.value = Math.round(pct * 1000);
        const p = pct * 100;
        seekEl.style.background = `linear-gradient(to right, var(--purple) ${p}%, var(--border) ${p}%)`;
    }
}

function stemVol(songId, name, val) {
    const m = MIXERS[songId];
    const t = m?.tracks.find(t => t.name === name);
    if (t) { t.vol = parseFloat(val); t.gain.gain.value = t.muted ? 0 : t.vol; }
    // Update slider gradient
    const el = document.querySelector(`#stemrow-${songId}-${name} .stem-vol`);
    if (el) el.style.background = `linear-gradient(to right, var(--purple) ${val*100}%, var(--border) ${val*100}%)`;
}

function stemMute(songId, name) {
    const m = MIXERS[songId];
    const t = m?.tracks.find(t => t.name === name);
    if (!t) return;
    t.muted = !t.muted;
    t.gain.gain.value = t.muted ? 0 : t.vol;
    document.getElementById(`stemrow-${songId}-${name}`)?.classList.toggle('muted', t.muted);
    document.getElementById(`stem-m-${songId}-${name}`)?.classList.toggle('on', t.muted);
}

function stemSolo(songId, name) {
    const m = MIXERS[songId];
    if (!m) return;
    const t = m.tracks.find(t => t.name === name);
    if (!t) return;
    t.solo = !t.solo;
    const anySolo = m.tracks.some(t => t.solo);
    m.tracks.forEach(tr => {
        const active = !anySolo || tr.solo;
        tr.gain.gain.value = active && !tr.muted ? tr.vol : 0;
        document.getElementById(`stemrow-${songId}-${tr.name}`)?.classList.toggle('muted', !active);
    });
    document.getElementById(`stem-s-${songId}-${name}`)?.classList.toggle('on', t.solo);
}

// Se mixer já foi carregado antes, restaura a UI sem recarregar
function maybeInitMixer(song) {
    if (!song.stemsPath || !MIXERS[song.id]) return;
    setTimeout(() => {
        const loadBtn = document.getElementById(`mixer-load-btn-${song.id}`);
        if (loadBtn) loadBtn.style.display = 'none';
        buildMixerUI(song.id);
        showMixerUI(song.id);
    }, 60);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
(async () => {
    hydrate();
    // Restore logged-in member session
    if (S.role === 'membro') {
        const memberId = localStorage.getItem('hl_current_member');
        S.currentMember = S.members.find(m=>m.id===memberId) || null;
        if (!S.currentMember) { S.role = null; localStorage.removeItem('hl_role'); }
    }
    // Remove músicas retiradas do repertório
    const removedSet = new Set(REMOVED.map(t => t.toLowerCase()));
    S.songs = S.songs.filter(s => !removedSet.has((s.title||'').toLowerCase()));
    // Adiciona músicas novas e sincroniza campos oficiais (ex: stemsPath, moisesUrl)
    SEED.forEach(seed => {
        const existing = S.songs.find(s => s.title.toLowerCase() === seed.title.toLowerCase());
        if (!existing) {
            S.songs.push(seed);
        } else {
            // Sempre sincroniza campos técnicos do seed para o local
            ['stemsPath','moisesUrl','youtubeUrl','spotifyUrl','deezerUrl'].forEach(k => {
                if (seed[k]) existing[k] = seed[k];
            });
        }
    });
    persist();
    await openDB();
    await loadPdfIndex();
    // Load YouTube IFrame API (async, no blocking)
    const ytScript = document.createElement('script');
    ytScript.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(ytScript);
    render();
})();
</script>
